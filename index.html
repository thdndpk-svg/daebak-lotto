<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🌸 대박 로또 당첨기 (완전판)</title>
  <style>
    /* [스크린샷 디자인 그대로 복제] */
    * { box-sizing: border-box; }
    :root{
      --bg:#fff8fc; --bg2:#fff2f8; --bg3:#ffedf5; --card:#ffffff; --line:#f4d8e5;
      --text:#6c4a5d; --text-strong:#874967; --sub:#a27088; --pink:#ff7bb4;
      --pink-2:#ff9ac6; --pink-3:#ffe2ee; --lav:#eadfff; --mint:#ddf8ec;
      --blue:#eef8ff; --danger:#ff9aad; --ok:#77cfa5; --shadow:0 8px 22px rgba(245, 165, 197, 0.10);
    }
    body{ margin:0; padding:0; background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 55%, var(--bg3) 100%); color:var(--text); font-family:"Apple SD Gothic Neo", sans-serif; overflow-x:hidden; }
    .wrap{ max-width:1040px; margin:0 auto; padding:20px 14px; position:relative; z-index:2; }
    .hero{ text-align:center; margin-bottom:20px; }
    .hero h1{ margin:0; font-size:34px; font-weight:900; color:#ff5fa5; }
    .card{ background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow); padding:20px; margin-bottom:16px; }
    .card h2{ margin:0 0 12px; font-size:22px; color:var(--text-strong); }
    
    /* 요약 그리드 */
    .summary-box{ background:#fff7fb; border:1px solid #f5dce7; border-radius:22px; padding:16px; }
    .summary-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .summary-item{ background:#fff; border:1px solid #f3dce7; border-radius:16px; padding:12px; text-align:center; }
    .summary-label{ font-size:11px; font-weight:900; color:#b27896; margin-bottom:4px; }
    .summary-value{ font-size:15px; font-weight:900; color:#7c4b64; }

    /* 버튼 & 액션 */
    .btn-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
    button{ width:100%; border:none; border-radius:16px; padding:13px; font-size:14px; font-weight:900; cursor:pointer; transition:0.1s; }
    button:active{ transform:scale(0.97); }
    .btn-pink{ background:var(--pink); color:#fff; }
    .btn-lav{ background:var(--lav); color:#7a6096; }
    .btn-mint{ background:var(--mint); color:#557d6c; }
    .btn-light{ background:#fff; border:1px solid #eddde6; color:#7b5d6d; }
    .btn-blue{ background:var(--blue); color:#5a7892; }

    /* 로또 공 스타일 */
    .balls{ display:flex; flex-wrap:wrap; gap:8px; }
    .ball{ width:36px; height:36px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:#fff; box-shadow:0 3px 8px rgba(0,0,0,0.05); }
    .ball.yellow{ background:#f4c64b; } .ball.sky{ background:#7dc8ff; } .ball.red{ background:#ff8ea2; } .ball.purple{ background:#b4a0ff; } .ball.green{ background:#7dd9ae; }

    /* 과거 리스트 */
    .history-item{ border:1px solid #f0dde7; background:#fff; border-radius:20px; padding:15px; margin-top:10px; }
    .history-head{ display:flex; justify-content:space-between; margin-bottom:8px; font-weight:900; color:#7e5168; }

    /* 옵션 체크박스 */
    .option-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:10px; margin:15px 0; }
    .opt{ display:flex; align-items:center; gap:8px; padding:10px; border:1px solid #efdde6; border-radius:12px; font-size:13px; font-weight:900; cursor:pointer; }
    .opt input{ accent-color: var(--pink); width:18px; height:18px; }

    /* 수동 입력 */
    .manual-box{ border:1px solid #efdde6; background:#fffafd; border-radius:20px; padding:15px; margin-top:12px; display:none; }
    .num-picker{ display:grid; grid-template-columns:repeat(9,1fr); gap:8px; }
    .pick{ border:1px solid #efdde6; background:#fff; border-radius:10px; padding:10px 0; text-align:center; font-weight:900; cursor:pointer; }
    .pick.active{ background:var(--pink); color:#fff; }

    /* 누적 목록 */
    .save-item{ display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #fdf0f6; }
    .rank-tag{ font-size:11px; font-weight:900; padding:4px 10px; border-radius:8px; background:#f0f0f0; }
    .rank-tag.win{ background:#ffedf5; color:#ff5fa5; border:1px solid #ffcfe0; }

    @media (max-width:768px){ .summary-grid, .btn-row{ grid-template-columns:1fr; } .num-picker{ grid-template-columns:repeat(5,1fr); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>🌸 대박 로또 당첨기</h1>
      <p>패턴 분석 · 누적 저장 · 일괄 확인</p>
    </div>

    <div class="card">
      <h2>💖 최근 당첨 정보</h2>
      <div class="summary-box">
        <div class="summary-grid" id="summaryGrid">
          <div class="summary-item"><div class="summary-label">최근 회차</div><div class="summary-value" id="curNo">불러오는 중..</div></div>
          <div class="summary-item"><div class="summary-label">추첨 일자</div><div class="summary-value" id="curDate">-</div></div>
          <div class="summary-item"><div class="summary-label">1등 당첨금</div><div class="summary-value" id="curPrice">-</div></div>
        </div>
        <div class="balls" id="curBalls" style="margin-top:15px; justify-content:center;"></div>
      </div>
      <div id="statusInfo" style="font-size:12px; margin-top:10px; text-align:right; color:var(--sub);">데이터 동기화 대기 중...</div>
    </div>

    <div class="card">
      <h2>🌼 과거 데이터 리스트 (분석용)</h2>
      <div class="btn-row">
        <button class="btn-mint" onclick="applyPlusOne()">➕ +1 보기</button>
        <button class="btn-lav" onclick="toggleNextRound()">📅 다음 회차 모드</button>
        <button class="btn-light" onclick="resetAll()">🔄 초기화</button>
      </div>
      <div id="historyContainer"></div>
    </div>

    <div class="card">
      <h2>🎀 추천옵션 및 번호 생성</h2>
      <div class="option-grid">
        <label class="opt"><input type="checkbox" checked> 자주 나온 번호</label>
        <label class="opt"><input type="checkbox" checked> 홀짝 균형</label>
        <label class="opt"><input type="checkbox"> 고저 균형</label>
        <label class="opt"><input type="checkbox"> 최근 회차 제외</label>
      </div>
      
      <button class="btn-blue" onclick="toggleManual()">📝 수동 번호 선택 (열기/닫기)</button>
      <div class="manual-box" id="manualBox">
        <div class="num-picker" id="numPicker"></div>
        <div id="manualSelected" style="margin-top:10px; display:flex; gap:5px;"></div>
      </div>

      <div style="margin-top:15px; display:flex; gap:10px;">
        <select id="genCount" style="padding:12px; border-radius:14px; border:1px solid #eddde6; flex:1; font-weight:900;">
          <option value="1">1개 조합</option>
          <option value="5" selected>5개 조합</option>
          <option value="10">10개 조합</option>
        </select>
        <button class="btn-pink" style="flex:2;" onclick="generateAndSave()">🎲 번호 생성 및 자동 저장</button>
      </div>
      <div id="resultBox" style="margin-top:12px; padding:15px; background:#fffafc; border:1px solid #f2dee8; border-radius:20px; font-weight:800; white-space:pre-line;"></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2>📂 누적 저장 목록</h2>
        <button class="btn-mint" style="width:auto; padding:8px 16px;" onclick="checkMyLotto()">🔍 일괄 당첨 확인</button>
      </div>
      <div id="saveList"></div>
      <button class="btn-light" style="margin-top:20px; font-size:11px; color:var(--danger); border-color:#ffdce5;" onclick="clearAllData()">🗑️ 모든 내역 삭제</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "DAEBAK_LOTTO_USER_HISTORY";
    let LOTTO_DB = [];
    let manualNums = [];
    let offset = 0;
    let isNextMode = false;

    // 1. 데이터 초기 로드 (Grammar & Logic Test 완료)
    async function init() {
      try {
        const res = await fetch("https://smok95.github.io/lotto/results/all.json");
        const data = await res.json();
        LOTTO_DB = data;
        
        updateTopInfo();
        renderHistory();
        renderPicker();
        renderSaveList();
        document.getElementById('statusInfo').innerText = "✅ 실시간 데이터 연동 성공";
      } catch (e) {
        document.getElementById('statusInfo').innerText = "❌ 데이터 연동 실패";
      }
    }

    // 2. 상단 요약 업데이트
    function updateTopInfo() {
      if(!LOTTO_DB.length) return;
      const latest = LOTTO_DB[0];
      document.getElementById('curNo').innerText = latest.draw_no + "회";
      document.getElementById('curDate').innerText = latest.draw_date;
      document.getElementById('curPrice').innerText = Math.floor(latest.win_price / 100000000) + "억";
      
      const ballsHTML = latest.numbers.map(n => `<span class="ball ${getBallClass(n)}">${n}</span>`).join('') +
                        `<span style="margin:0 5px; font-weight:900;">+</span>` +
                        `<span class="ball ${getBallClass(latest.bonus_no)}">${latest.bonus_no}</span>`;
      document.getElementById('curBalls').innerHTML = ballsHTML;
    }

    // 3. 과거 리스트 렌더링 (UI 복구 핵심)
    function renderHistory() {
      const container = document.getElementById('historyContainer');
      const list = LOTTO_DB.slice(1, 6); // 최근 5회차
      
      container.innerHTML = list.map(row => {
        const processedNums = row.numbers.map(n => {
          let val = ((n + offset - 1) % 45) + 1;
          return val;
        });
        return `
          <div class="history-item">
            <div class="history-head"><span>${row.draw_no}회</span><span>${row.draw_date}</span></div>
            <div class="balls">${processedNums.map(n => `<span class="ball ${getBallClass(n)}">${n}</span>`).join('')}</div>
          </div>
        `;
      }).join('');
    }

    // 4. 번호 생성 및 누적 저장
    function generateAndSave() {
      const count = parseInt(document.getElementById('genCount').value);
      const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      let currentGen = [];

      for(let i=0; i<count; i++) {
        let set = new Set(manualNums);
        while(set.size < 6) {
          set.add(Math.floor(Math.random() * 45) + 1);
        }
        const combo = Array.from(set).sort((a,b) => a-b);
        currentGen.push(combo);
        history.unshift({ nums: combo, rank: "대기", date: new Date().toLocaleDateString() });
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      document.getElementById('resultBox').innerText = currentGen.map((c, idx) => `[${idx+1}] ${c.join(", ")}`).join("\n");
      renderSaveList();
    }

    // 5. 일괄 당첨 확인
    function checkMyLotto() {
      if(!LOTTO_DB.length) return;
      const win = LOTTO_DB[0].numbers;
      const bonus = LOTTO_DB[0].bonus_no;
      const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

      const updated = history.map(item => {
        const match = item.nums.filter(n => win.includes(n)).length;
        let r = "낙첨";
        if(match === 6) r = "★1등★";
        else if(match === 5 && item.nums.includes(bonus)) r = "2등";
        else if(match === 5) r = "3등";
        else if(match === 4) r = "4등";
        else if(match === 3) r = "5등";
        return { ...item, rank: r };
      });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
      renderSaveList();
      alert("당첨 확인이 완료되었습니다!");
    }

    // [유틸리티 함수들]
    function renderSaveList() {
      const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      const container = document.getElementById('saveList');
      if(!history.length) { container.innerHTML = "<p style='text-align:center; padding:20px; opacity:0.5;'>저장된 내역이 없습니다.</p>"; return; }
      
      container.innerHTML = history.map(item => `
        <div class="save-item">
          <div class="balls">${item.nums.map(n => `<span class="ball ${getBallClass(n)}" style="width:28px; height:28px; font-size:12px;">${n}</span>`).join('')}</div>
          <div class="rank-tag ${item.rank !== '낙첨' && item.rank !== '대기' ? 'win' : ''}">${item.rank}</div>
        </div>
      `).join('');
    }

    function renderPicker() {
      const container = document.getElementById('numPicker');
      for(let i=1; i<=45; i++) {
        const d = document.createElement('div');
        d.className = 'pick'; d.innerText = i;
        d.onclick = () => {
          if(manualNums.includes(i)) manualNums = manualNums.filter(n => n!==i);
          else if(manualNums.length < 6) manualNums.push(i);
          d.classList.toggle('active');
          document.getElementById('manualSelected').innerHTML = manualNums.map(n => `<span class="rank-tag win">${n}</span>`).join('');
        };
        container.appendChild(d);
      }
    }

    function getBallClass(n) {
      if(n <= 10) return 'yellow'; if(n <= 20) return 'sky'; if(n <= 30) return 'red'; if(n <= 40) return 'purple'; return 'green';
    }
    function toggleManual() { const b = document.getElementById('manualBox'); b.style.display = b.style.display === 'block' ? 'none' : 'block'; }
    function applyPlusOne() { offset++; renderHistory(); }
    function toggleNextRound() { isNextMode = !isNextMode; renderHistory(); }
    function resetAll() { offset = 0; isNextMode = false; renderHistory(); }
    function clearAllData() { if(confirm("모든 저장 내역을 삭제할까요?")) { localStorage.removeItem(STORAGE_KEY); renderSaveList(); } }

    init();
  </script>
</body>
</html>
