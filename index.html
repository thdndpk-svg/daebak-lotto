<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌸 대박 로또 당첨기</title>
  <style>
    /* [UI 복구: 스크린샷과 동일한 스타일] */
    :root{
      --bg:#fff8fc; --bg2:#fff2f8; --bg3:#ffedf5; --card:#ffffff; --line:#f4d8e5;
      --text:#6c4a5d; --text-strong:#874967; --sub:#a27088; --pink:#ff7bb4;
      --pink-btn:#ff79b3; --lav:#eadfff; --mint:#ddf8ec; --blue:#eef8ff;
      --shadow:0 8px 22px rgba(245, 165, 197, 0.15);
    }
    body{ margin:0; padding:20px; background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 55%, var(--bg3) 100%); font-family: sans-serif; color:var(--text); }
    .wrap{ max-width:900px; margin:0 auto; }
    .hero{ text-align:center; margin-bottom:25px; }
    .hero h1{ font-size:32px; color:#ff5fa5; margin:0; }
    .hero p{ font-size:13px; color:var(--sub); font-weight:bold; }

    .card{ background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow); padding:24px; margin-bottom:20px; }
    .card h2{ font-size:22px; color:var(--text-strong); margin:0 0 15px 0; display:flex; align-items:center; gap:8px; }

    /* 자동화 정보 그리드 */
    .info-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .info-item{ background:#fff; border:1px solid #f3dce7; border-radius:16px; padding:12px; }
    .info-label{ font-size:11px; font-weight:bold; color:#b27896; margin-bottom:4px; }
    .info-val{ font-size:15px; font-weight:900; color:#7c4b64; }

    /* 버튼 스타일 */
    .btn-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:15px; }
    button{ border:none; border-radius:14px; padding:14px; font-size:14px; font-weight:900; cursor:pointer; transition:0.1s; }
    .btn-mint{ background:var(--mint); color:#557d6c; }
    .btn-lav{ background:var(--lav); color:#7a6096; }
    .btn-light{ background:#fff; border:1px solid #eddde6; color:#7b5d6d; }
    .btn-pink{ background:var(--pink-btn); color:#fff; width:100%; font-size:16px; }
    .btn-blue{ background:var(--blue); color:#5a7892; }

    /* 번호판 스타일 */
    .num-grid{ display:grid; grid-template-columns:repeat(9,1fr); gap:8px; margin:15px 0; }
    .pick{ border:1px solid #eee; background:#fff; border-radius:8px; padding:10px 0; text-align:center; cursor:pointer; font-weight:900; color:#888; }
    .pick.active{ background:var(--pink); color:#fff; border-color:var(--pink); }

    /* 패턴 시각화 영역 */
    .pattern-box{ border:2px dashed #f4d8e5; border-radius:20px; min-height:200px; margin-top:10px; display:flex; flex-wrap:wrap; align-content: flex-start; padding:10px; gap:4px; }
    .pt-cell{ width:18%; height:30px; border-radius:4px; background:#fff; border:1px solid #fdf0f6; }

    /* 옵션 체크박스 */
    .opt-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(130px, 1fr)); gap:10px; margin-bottom:15px; }
    .opt-item{ border:1px solid #f0dde7; padding:10px; border-radius:12px; font-size:13px; font-weight:bold; display:flex; align-items:center; gap:8px; }

    /* 저장 목록 */
    .save-item{ display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #fdf0f6; }
    .balls{ display:flex; gap:6px; }
    .ball{ width:32px; height:32px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; color:#fff; }
    .ball.y{background:#f4c64b} .ball.s{background:#7dc8ff} .ball.r{background:#ff8ea2} .ball.p{background:#b4a0ff} .ball.g{background:#7dd9ae}
    .rank{ font-size:12px; font-weight:bold; padding:4px 8px; border-radius:8px; background:#f0f0f0; }
    .rank.win{ background:#ffedf5; color:#ff5fa5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>🌸 대박 로또 당첨기</h1>
      <p>실시간 데이터 · 번호생성 · 저장 · 일괄당첨확인 · 패턴분석</p>
    </div>

    <div class="card">
      <h2>💖 자동화 정보</h2>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">기준 추첨일</div><div class="info-val" id="dDate">-</div></div>
        <div class="info-item"><div class="info-label">현재 회차</div><div class="info-val" id="dNo">-</div></div>
        <div class="info-item"><div class="info-label">1등 당첨번호</div><div class="info-val" id="dNums">-</div></div>
        <div class="info-item"><div class="info-label">당첨자 수</div><div class="info-val" id="dWin">-</div></div>
        <div class="info-item"><div class="info-label">당첨금액</div><div class="info-val" id="dMoney">-</div></div>
        <div class="info-item"><div class="info-label">다음회차 추첨일</div><div class="info-val" id="dNext">-</div></div>
      </div>
      <div id="status" style="margin-top:10px; font-size:12px; color:var(--pink);">데이터 로드 중...</div>
    </div>

    <div class="card">
      <h2>🌼 같은 날짜 과거 데이터</h2>
      <div class="btn-row">
        <button class="btn-mint" onclick="handlePlus(1)">➕ +1 보기</button>
        <button class="btn-lav" onclick="toggleNextMode()">📅 다음 회차 데이터</button>
        <button class="btn-light" onclick="resetAll()">🔄 초기화</button>
      </div>
      <div id="historyView" style="margin-top:15px; font-size:13px; color:var(--sub);"></div>
    </div>

    <div class="card">
      <h2>🌸 번호 생성 및 분석</h2>
      <div class="num-grid" id="picker"></div>
      <button class="btn-pink" onclick="generateAndSave()">🎲 번호 생성 및 자동 저장</button>
    </div>

    <div class="card">
      <h2>🎨 패턴 시각화 (9x5)</h2>
      <div class="pattern-box" id="patternBox"></div>
    </div>

    <div class="card">
      <h2>🎀 번호 생성 옵션</h2>
      <div class="opt-grid">
        <label class="opt-item"><input type="checkbox" checked> 자주 나온 번호</label>
        <label class="opt-item"><input type="checkbox" checked> 홀짝 균형</label>
        <label class="opt-item"><input type="checkbox"> 고저 균형</label>
        <label class="opt-item"><input type="checkbox"> 최근 회차 제외</label>
      </div>
      <div class="btn-row">
        <button class="btn-blue" onclick="alert('수동 입력 모드')">📝 수동번호 입력</button>
        <button class="btn-light" onclick="clearSelection()">🧹 수동번호 지우기</button>
        <button class="btn-mint" onclick="manualSave()">💾 수동번호 저장</button>
      </div>
    </div>

    <div class="card">
      <h2>🏆 누적 내역 & 당첨 확인</h2>
      <button class="btn-mint" style="width:100%; margin-bottom:12px;" onclick="checkAll()">🔍 최신 회차 일괄 당첨 확인</button>
      <div id="saveList"></div>
      <button class="btn-light" style="width:100%; margin-top:15px; color:red;" onclick="clearStorage()">🗑️ 내역 초기화</button>
    </div>
  </div>

  <script>
    const S_KEY = "LOTTO_FINAL_DATA";
    let DB = [];
    let selected = [];
    let offset = 0;

    async function init() {
      try {
        const res = await fetch("https://smok95.github.io/lotto/results/all.json");
        DB = await res.json();
        updateTop();
        renderPicker();
        renderSaves();
        document.getElementById('status').innerText = "✅ 데이터 연동 성공";
      } catch(e) { document.getElementById('status').innerText = "❌ 로드 실패"; }
    }

    function updateTop() {
      const cur = DB[0];
      document.getElementById('dNo').innerText = cur.draw_no + "회";
      document.getElementById('dDate').innerText = cur.draw_date;
      document.getElementById('dNums').innerText = cur.numbers.join(", ");
      document.getElementById('dWin').innerText = cur.win_count + "명";
      document.getElementById('dMoney').innerText = Math.round(cur.win_price/100000000) + "억";
      document.getElementById('dNext').innerText = "토요일";
    }

    function renderPicker() {
      const p = document.getElementById('picker');
      for(let i=1; i<=45; i++) {
        const d = document.createElement('div'); d.className = 'pick'; d.innerText = i;
        d.onclick = () => {
          if(selected.includes(i)) selected = selected.filter(n => n!==i);
          else if(selected.length < 6) selected.push(i);
          d.classList.toggle('active');
        };
        p.appendChild(d);
      }
    }

    function generateAndSave() {
      let set = new Set(selected);
      while(set.size < 6) set.add(Math.floor(Math.random()*45)+1);
      const nums = Array.from(set).sort((a,b)=>a-b);
      save(nums);
      drawPattern(nums);
    }

    function save(nums) {
      const data = JSON.parse(localStorage.getItem(S_KEY) || "[]");
      data.unshift({ nums, rank: "-" });
      localStorage.setItem(S_KEY, JSON.stringify(data));
      renderSaves();
    }

    function renderSaves() {
      const data = JSON.parse(localStorage.getItem(S_KEY) || "[]");
      const list = document.getElementById('saveList');
      list.innerHTML = data.map(item => `
        <div class="save-item">
          <div class="balls">${item.nums.map(n => `<span class="ball ${getBC(n)}">${n}</span>`).join('')}</div>
          <div class="rank ${item.rank !== '-' && item.rank !== '낙첨' ? 'win' : ''}">${item.rank}</div>
        </div>
      `).join('');
    }

    function checkAll() {
      const win = DB[0].numbers;
      const bonus = DB[0].bonus_no;
      const data = JSON.parse(localStorage.getItem(S_KEY) || "[]");
      const updated = data.map(item => {
        const match = item.nums.filter(n => win.includes(n)).length;
        let r = "낙첨";
        if(match===6) r="1등";
        else if(match===5 && item.nums.includes(bonus)) r="2등";
        else if(match===5) r="3등";
        else if(match===4) r="4등";
        else if(match===3) r="5등";
        return { ...item, rank: r };
      });
      localStorage.setItem(S_KEY, JSON.stringify(updated));
      renderSaves();
    }

    function drawPattern(nums) {
      const box = document.getElementById('patternBox');
      box.innerHTML = "";
      for(let i=1; i<=45; i++) {
        const cell = document.createElement('div'); cell.className = 'pt-cell';
        if(nums.includes(i)) cell.style.background = "#ff7bb4";
        box.appendChild(cell);
      }
    }

    function getBC(n) { if(n<=10) return 'y'; if(n<=20) return 's'; if(n<=30) return 'r'; if(n<=40) return 'p'; return 'g'; }
    function clearSelection() { selected = []; document.querySelectorAll('.pick').forEach(p=>p.classList.remove('active')); }
    function clearStorage() { if(confirm("삭제할까요?")) { localStorage.removeItem(S_KEY); renderSaves(); } }
    
    init();
  </script>
</body>
</html>
