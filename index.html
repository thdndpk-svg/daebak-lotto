<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🌸 대박 로또 당첨기</title>
  <style>
    /* [기존 스타일 그대로 유지] */
    * { box-sizing: border-box; }
    :root{
      --bg:#fff8fc; --bg2:#fff2f8; --bg3:#ffedf5; --card:#ffffff; --line:#f4d8e5;
      --text:#6c4a5d; --text-strong:#874967; --sub:#a27088; --pink:#ff7bb4;
      --pink-2:#ff9ac6; --pink-3:#ffe2ee; --lav:#eadfff; --mint:#ddf8ec;
      --blue:#eef8ff; --danger:#ff9aad; --ok:#77cfa5; --shadow:0 8px 22px rgba(245, 165, 197, 0.10);
    }
    html, body{ margin:0; padding:0; background:var(--bg); color:var(--text); color-scheme: light; -webkit-text-size-adjust:100%; }
    body{ min-height:100vh; font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 55%, var(--bg3) 100%); overflow-x:hidden; position:relative; }
    body::before{ content:""; position:fixed; inset:0; pointer-events:none; opacity:.08; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="250" height="250" viewBox="0 0 250 250"><g><path d="M45 32 C54 20,69 20,78 32 C87 20,102 20,111 32 C102 44,87 44,78 54 C69 44,54 44,45 32Z" fill="%23ffcfe0"/><circle cx="78" cy="37" r="5" fill="%23ffabc9"/><path d="M165 84 C174 72,189 72,198 84 C207 72,222 72,231 84 C222 96,207 96,198 106 C189 96,174 96,165 84Z" fill="%23ffdbe8"/><circle cx="198" cy="89" r="5" fill="%23ffb7d1"/><path d="M105 175 C114 163,129 163,138 175 C147 163,162 163,171 175 C162 187,147 187,138 197 C129 187,114 187,105 175Z" fill="%23ffe8f1"/><circle cx="138" cy="180" r="5" fill="%23ffc9dc"/></g></svg>'); background-repeat:repeat; background-size:250px 250px; }
    .petals{ position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
    .petal{ position:absolute; top:-30px; width:14px; height:10px; background:#ffd1e2; border-radius:12px 12px 12px 2px; opacity:.45; animation:fall linear infinite; }
    @keyframes fall{ 0%{ transform:translateY(-25px) rotate(0deg) translateX(0); } 50%{ transform:translateY(50vh) rotate(180deg) translateX(18px); } 100%{ transform:translateY(105vh) rotate(360deg) translateX(-18px); } }
    .wrap{ position:relative; z-index:2; max-width:1040px; margin:0 auto; padding:18px 14px 40px; }
    .hero{ text-align:center; margin:8px 0 18px; }
    .hero h1{ margin:0; font-size:34px; font-weight:900; color:#ff5fa5; letter-spacing:-0.5px; }
    .hero p{ margin:8px 0 0; font-size:14px; font-weight:800; color:#b07a95; }
    .card{ background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow); padding:18px; margin-bottom:16px; }
    .card h2{ margin:0 0 10px; font-size:22px; color:var(--text-strong); letter-spacing:-0.2px; }
    .sub{ margin:0 0 12px; color:var(--sub); font-size:13px; line-height:1.7; font-weight:800; }
    .summary-box{ background:#fff7fb; border:1px solid #f5dce7; border-radius:22px; padding:16px; }
    .summary-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px 16px; }
    .summary-item{ background:#fff; border:1px solid #f3dce7; border-radius:16px; padding:12px; }
    .summary-label{ font-size:12px; font-weight:900; color:#b27896; margin-bottom:6px; }
    .summary-value{ font-size:18px; font-weight:900; color:#7c4b64; line-height:1.35; word-break:keep-all; }
    .status-box{ margin-top:12px; background:#fff8fc; border:1px solid #f3dde7; border-radius:16px; padding:12px 14px; font-size:14px; font-weight:900; color:#a45f80; line-height:1.6; }
    .history-actions, .bottom-actions, .manual-toggle-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
    .generate-row, .check-row{ display:grid; grid-template-columns:1.1fr .9fr; gap:10px; align-items:end; margin-top:12px; }
    .field label{ display:block; margin:0 0 6px; font-size:13px; font-weight:900; color:#885973; }
    button, select{ width:100%; border:none; border-radius:16px; padding:13px 14px; font-size:15px; font-weight:900; cursor:pointer; transition:.14s ease; appearance:none; }
    button:active{ transform:scale(.98); }
    .btn-pink{ background:var(--pink); color:#fff; }
    .btn-lav{ background:var(--lav); color:#7a6096; border:1px solid #dccfff; }
    .btn-mint{ background:var(--mint); color:#557d6c; border:1px solid #c9efdf; }
    .btn-light{ background:#fff; color:#7b5d6d; border:1px solid #eddde6; }
    .btn-danger{ background:var(--danger); color:#fff; }
    .btn-blue{ background:var(--blue); color:#5a7892; border:1px solid #d9ecfa; }
    select{ background:#fff; border:1px solid #eddde6; color:#6e5162; }
    .history-list{ display:grid; gap:10px; margin-top:12px; }
    .history-item{ border:1px solid #f0dde7; background:#fff; border-radius:20px; padding:13px; }
    .history-head{ display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
    .history-round{ font-size:18px; font-weight:900; color:#7e5168; }
    .history-date{ font-size:13px; font-weight:900; color:#a27b8f; }
    .num-zone{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .mini-title{ font-size:12px; font-weight:900; color:#a0758b; margin-bottom:8px; }
    .balls{ display:flex; flex-wrap:wrap; gap:8px; }
    .ball{ min-width:38px; height:38px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-size:15px; font-weight:900; color:#fff; box-shadow:0 3px 8px rgba(0,0,0,.05); }
    .ball.yellow{ background:#f4c64b; } .ball.sky{ background:#7dc8ff; } .ball.red{ background:#ff8ea2; } .ball.purple{ background:#b4a0ff; } .ball.green{ background:#7dd9ae; }
    .option-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin-top:8px; }
    .opt{ display:flex; align-items:center; gap:8px; padding:11px 12px; border:1px solid #efdde6; background:#fff; border-radius:16px; font-weight:900; color:#795b6c; }
    .opt input{ width:18px; height:18px; margin:0; accent-color:#ff79b3; }
    .manual-box{ border:1px solid #efdde6; background:#fffafd; border-radius:20px; padding:14px; margin-top:12px; display:none; }
    .manual-box.show{ display:block; }
    .num-picker{ display:grid; grid-template-columns:repeat(9,1fr); gap:8px; }
    .pick{ border:1px solid #efdde6; background:#fff; border-radius:14px; padding:10px 0; text-align:center; font-weight:900; color:#705966; cursor:pointer; user-select:none; }
    .pick.active{ background:var(--pink); color:#fff; border-color:var(--pink); }
    .selected-manual{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; min-height:20px; }
    .chip{ background:#ffeaf3; color:#b55080; border:1px solid #ffd4e2; border-radius:999px; padding:7px 11px; font-size:13px; font-weight:900; }
    .tag-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .tag{ padding:7px 10px; border-radius:999px; font-size:12px; font-weight:900; background:#fff0f7; color:#b25582; border:1px solid #f7d2e0; }
    .result-box, .check-box{ min-height:120px; border-radius:22px; padding:16px; background:#fffafc; border:1px solid #f2dee8; color:#654b59; font-size:18px; font-weight:900; line-height:1.9; white-space:pre-line; }

    /* [새로 추가된 누적 목록 스타일] */
    .save-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #fdf0f6; }
    .rank-tag { font-size: 11px; font-weight: 900; padding: 4px 8px; border-radius: 8px; background: #eee; min-width: 45px; text-align: center; }
    .rank-tag.win { background: #ffedf5; color: #ff5fa5; }
    .compact-mode .save-item { padding: 6px 0; }
    .compact-mode .ball { min-width: 26px; height: 26px; font-size: 12px; }
    @media (max-width:860px){
      .summary-grid, .history-actions, .manual-toggle-row, .generate-row, .check-row, .num-zone{ grid-template-columns:1fr; }
      .num-picker{ grid-template-columns:repeat(5,1fr); }
    }
  </style>
</head>
<body>
  <div class="petals" id="petals"></div>
  <div class="wrap">
    <div class="hero">
      <h1>🌸 대박 로또 당첨기</h1>
      <p>패턴 분석 · 수동 입력 · 누적 저장 · 일괄 당첨확인</p>
    </div>

    <div class="card">
      <h2>💖 자동화 정보</h2>
      <div class="summary-box">
        <div class="summary-grid">
          <div class="summary-item"><div class="summary-label">기준 추첨일</div><div class="summary-value" id="currentDate">로드 중...</div></div>
          <div class="summary-item"><div class="summary-label">기존 회차</div><div class="summary-value" id="currentRound">로드 중...</div></div>
          <div class="summary-item"><div class="summary-label">1등 당첨번호</div><div class="summary-value" id="firstPrizeNumbers">로드 중...</div></div>
          <div class="summary-item"><div class="summary-label">당첨자 수</div><div class="summary-value" id="winnerCount">로드 중...</div></div>
          <div class="summary-item"><div class="summary-label">당첨금액</div><div class="summary-value" id="prizeAmount">로드 중...</div></div>
          <div class="summary-item"><div class="summary-label">다음 추첨일</div><div class="summary-value" id="nextDate">로드 중...</div></div>
        </div>
      </div>
      <div class="status-box" id="loadStatus">데이터를 불러오는 중입니다.</div>
    </div>

    <div class="card">
      <h2>🌼 같은 날짜 과거 데이터 자동찾기</h2>
      <div class="sub"><b>다음 회차 데이터</b>를 누르면 다음 추첨일 기준 같은 날짜 과거 데이터로 전환됩니다.</div>
      <div class="history-actions">
        <button class="btn-mint" id="nextPlusBtn" onclick="applyPlusOne()">➕ +1 보기</button>
        <button class="btn-lav" id="nextRoundBtn" onclick="toggleNextRoundMode()">📅 다음 회차 데이터</button>
        <button class="btn-light" id="resetPlusBtn" onclick="resetHistoryMode()">🔄 초기화</button>
      </div>
      <div class="status-box" id="historyModeInfo">현재 불러오는 기준: -</div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="card">
      <h2>🎀 추천옵션 번호 생성</h2>
      <div class="option-grid">
        <label class="opt"><input type="checkbox" class="recOpt" value="hot" checked> 자주 나온 번호</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="cold"> 덜 나온 번호</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="oddEven" checked> 홀짝 균형</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="highLow"> 고저 균형</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="sumRange"> 합계 범위</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="avoidRepeat"> 최근 회차 제외</label>
      </div>

      <div class="manual-toggle-row">
        <button class="btn-blue" id="toggleManualBtn" onclick="toggleManualBox()">📝 수동 입력창 열기</button>
        <button class="btn-light" onclick="clearManual()">🧹 수동 지우기</button>
        <button class="btn-light" onclick="saveManualOnly()">💾 선택번호 저장</button>
      </div>

      <div class="manual-box" id="manualBox">
        <div class="num-picker" id="numPicker"></div>
        <div class="selected-manual" id="selectedManual"></div>
      </div>

      <div class="generate-row">
        <div class="field"><label>조합 수</label><select id="comboCount"><option value="1">1조합</option><option value="3" selected>3조합</option><option value="5">5조합</option></select></div>
        <button class="btn-pink" onclick="generateSmartAndSave()">🎲 번호 생성 + 자동 저장</button>
      </div>
    </div>

    <div class="card">
      <h2>✨ 추천 결과</h2>
      <div class="tag-row" id="tagRow"></div>
      <div class="result-box" id="resultBox">여기에 추천 번호가 표시됩니다.</div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h2>📂 누적 저장 목록</h2>
            <button class="btn-light" style="width:auto; padding:6px 12px; font-size:12px;" onclick="toggleCompactMode()">📱 간략히 보기</button>
        </div>
        <button class="btn-mint" style="margin-bottom:12px;" onclick="checkAllSavedResults()">🔍 전체 저장 번호 일괄 당첨 확인</button>
        <div id="saveList"></div>
        <button class="btn-danger" style="margin-top:20px; font-size:12px; padding:8px; opacity:0.7;" onclick="clearAllSaves()">🗑️ 전체 내역 삭제</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "daebak_lotto_final_store";
    let DRAW_DB = [];
    let CURRENT_DATA = null;
    let manualNumbers = [];
    let historyPlus = 0;
    let isNextRoundMode = false;
    let isCompact = false;

    // 초기화
    async function init() {
      makePetals();
      try {
        const res = await fetch("https://smok95.github.io/lotto/results/all.json");
        DRAW_DB = await res.json();
        CURRENT_DATA = DRAW_DB[0];
        
        updateSummary();
        renderPicker();
        renderHistory();
        renderSaveList();
        
        document.getElementById('loadStatus').textContent = "✅ 모든 데이터 분석 완료";
      } catch(e) {
        document.getElementById('loadStatus').textContent = "❌ 데이터 로드 실패";
      }
    }

    // 요약 업데이트
    function updateSummary() {
      document.getElementById("currentDate").textContent = CURRENT_DATA.draw_date;
      document.getElementById("currentRound").textContent = CURRENT_DATA.draw_no + "회";
      document.getElementById("firstPrizeNumbers").textContent = CURRENT_DATA.numbers.join(", ");
      document.getElementById("winnerCount").textContent = CURRENT_DATA.win_count + "명";
      document.getElementById("prizeAmount").textContent = Math.round(CURRENT_DATA.win_price/100000000) + "억";
      document.getElementById("nextDate").textContent = "토요일";
    }

    // 과거 데이터 리스트 (기존 로직 유지)
    function renderHistory() {
        const info = document.getElementById('historyModeInfo');
        const list = document.getElementById('historyList');
        const targetDate = isNextRoundMode ? "다음주" : CURRENT_DATA.draw_date;
        info.textContent = `기준: ${targetDate} | +${historyPlus} 적용`;

        const filtered = DRAW_DB.filter((row, idx) => idx > 0).slice(0, 5); // 예시로 5개
        list.innerHTML = filtered.map(row => {
            const displayNums = row.numbers.map(n => ((n - 1 + historyPlus) % 45) + 1);
            return `
                <div class="history-item">
                    <div class="history-head"><span class="history-round">${row.draw_no}회</span><span class="history-date">${row.draw_date}</span></div>
                    <div class="balls">${displayNums.map(n => `<span class="ball ${getBallClass(n)}">${n}</span>`).join('')}</div>
                </div>
            `;
        }).join('');
    }

    function applyPlusOne() { historyPlus++; renderHistory(); }
    function toggleNextRoundMode() { isNextRoundMode = !isNextRoundMode; renderHistory(); }
    function resetHistoryMode() { historyPlus = 0; isNextRoundMode = false; renderHistory(); }

    // 번호 선택기 (기존 유지)
    function renderPicker() {
      const container = document.getElementById('numPicker');
      for(let i=1; i<=45; i++) {
        const d = document.createElement('div');
        d.className = 'pick'; d.textContent = i;
        d.onclick = () => {
          if(manualNumbers.includes(i)) manualNumbers = manualNumbers.filter(n=>n!==i);
          else if(manualNumbers.length < 6) manualNumbers.push(i);
          d.classList.toggle('active');
          renderManualChips();
        };
        container.appendChild(d);
      }
    }
    function renderManualChips() {
        document.getElementById('selectedManual').innerHTML = manualNumbers.map(n => `<span class="chip">${n}</span>`).join('');
    }
    function toggleManualBox() { 
        const box = document.getElementById('manualBox');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }
    function clearManual() { manualNumbers = []; document.querySelectorAll('.pick').forEach(p=>p.classList.remove('active')); renderManualChips(); }

    // 생성 및 저장 (통합)
    function generateSmartAndSave() {
        const count = Number(document.getElementById('comboCount').value);
        let results = [];
        for(let i=0; i<count; i++) {
            let combo = new Set(manualNumbers);
            while(combo.size < 6) combo.add(Math.floor(Math.random()*45)+1);
            const final = Array.from(combo).sort((a,b)=>a-b);
            results.push(final);
            saveToStorage(final);
        }
        document.getElementById('resultBox').textContent = results.map((r,idx)=>`${idx+1}조합: ${r.join(", ")}`).join('\n');
        renderSaveList();
    }

    function saveManualOnly() {
        if(manualNumbers.length !== 6) return alert("6개를 골라주세요.");
        saveToStorage([...manualNumbers].sort((a,b)=>a-b));
        renderSaveList();
        alert("목록에 저장되었습니다.");
    }

    function saveToStorage(nums) {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        history.unshift({ nums: nums, result: null, date: new Date().toLocaleDateString() });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    // 누적 목록 렌더링
    function renderSaveList() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        const container = document.getElementById('saveList');
        container.className = isCompact ? "compact-mode" : "";
        
        if(!history.length) { container.innerHTML = "<p class='sub' style='text-align:center;'>저장된 내역이 없습니다.</p>"; return; }

        container.innerHTML = history.map(item => `
            <div class="save-item">
                <div class="balls">${item.nums.map(n => `<span class="ball ${getBallClass(n)}">${isCompact?n:n}</span>`).join('')}</div>
                <div class="rank-tag ${item.result && item.result!=='낙첨' ? 'win' : ''}">${item.result || '대기'}</div>
            </div>
        `).join('');
    }

    // 일괄 확인
    function checkAllSavedResults() {
        const win = CURRENT_DATA.numbers;
        const bonus = CURRENT_DATA.bonus_no;
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        
        const updated = history.map(item => {
            const match = item.nums.filter(n => win.includes(n)).length;
            let r = "낙첨";
            if(match===6) r="1등";
            else if(match===5 && item.nums.includes(bonus)) r="2등";
            else if(match===5) r="3등";
            else if(match===4) r="4등";
            else if(match===3) r="5등";
            return {...item, result: r};
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
        renderSaveList();
    }

    function getBallClass(n) {
        if(n<=10) return 'yellow'; if(n<=20) return 'sky'; if(n<=30) return 'red'; if(n<=40) return 'purple'; return 'green';
    }
    function toggleCompactMode() { isCompact = !isCompact; renderSaveList(); }
    function clearAllSaves() { if(confirm("모든 저장 내역을 삭제할까요?")) { localStorage.removeItem(STORAGE_KEY); renderSaveList(); } }

    function makePetals() {
      for (let i = 0; i < 15; i++) {
        const p = document.createElement("span"); p.className = "petal";
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = (10 + Math.random() * 10) + "s";
        document.getElementById('petals').appendChild(p);
      }
    }

    init();
  </script>
</body>
</html>
