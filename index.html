<script>
  const STORAGE_KEY = "daebak_lotto_live_v1";
  const SAVED_NUMBERS_KEY = "daebak_lotto_saved_numbers_v1";
  const API_BASE = "https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=";

  const FIRST_DRAW_DATE = "2002-12-07"; // 1회차 기준일
  const ONE_WEEK = 7 * 24 * 60 * 60 * 1000;

  const historyListEl = document.getElementById("historyList");
  const historyModeInfoEl = document.getElementById("historyModeInfo");
  const numPickerEl = document.getElementById("numPicker");
  const selectedManualEl = document.getElementById("selectedManual");
  const manualCountEl = document.getElementById("manualCount");
  const comboCountEl = document.getElementById("comboCount");
  const resultBoxEl = document.getElementById("resultBox");
  const tagRowEl = document.getElementById("tagRow");
  const checkBoxEl = document.getElementById("checkBox");
  const petalsEl = document.getElementById("petals");
  const manualBoxEl = document.getElementById("manualBox");
  const toggleManualBtnEl = document.getElementById("toggleManualBtn");

  let plusStep = 0;
  let manualNumbers = [];
  let historyBaseDate = null;
  let lastGeneratedCombos = [];

  let CURRENT_ROUND = null;
  let CURRENT_DRAW_DATE = null;
  let NEXT_DRAW_DATE = null;
  let CURRENT_FIRST_PRIZE = [];
  let CURRENT_WINNER_COUNT = null;
  let CURRENT_PRIZE_AMOUNT = null;

  let DRAW_DB = [];

  function makePetals() {
    const count = 14;
    for (let i = 0; i < count; i++) {
      const p = document.createElement("span");
      p.className = "petal";
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = (10 + Math.random() * 10) + "s";
      p.style.animationDelay = (-Math.random() * 18) + "s";
      petalsEl.appendChild(p);
    }
  }

  function formatMoneyKRW(value) {
    if (typeof value !== "number" || Number.isNaN(value)) return "-";
    return value.toLocaleString("ko-KR") + "원";
  }

  function addDays(dateStr, days) {
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + days);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function getMonthDay(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    return { month: m, day: d };
  }

  function daysBetween(a, b) {
    const da = new Date(a + "T00:00:00");
    const db = new Date(b + "T00:00:00");
    return Math.round((db - da) / (24 * 60 * 60 * 1000));
  }

  async function fetchRound(round) {
    const res = await fetch(API_BASE + round, { method: "GET" });
    if (!res.ok) {
      throw new Error("회차 조회 실패: HTTP " + res.status);
    }
    const data = await res.json();
    if (!data || data.returnValue !== "success") {
      throw new Error("유효하지 않은 회차: " + round);
    }
    return {
      round: data.drwNo,
      date: data.drwNoDate,
      numbers: [
        data.drwtNo1,
        data.drwtNo2,
        data.drwtNo3,
        data.drwtNo4,
        data.drwtNo5,
        data.drwtNo6
      ],
      bonus: data.bnusNo,
      firstPrizeWinnerCount: data.firstPrzwnerCo,
      firstPrizeAmount: data.firstWinamnt
    };
  }

  async function findLatestRound() {
    // 1회차 기준일(2002-12-07)로 대략 추정 후 내려가며 확인
    const today = new Date();
    const first = new Date(FIRST_DRAW_DATE + "T00:00:00");
    const diffWeeks = Math.floor((today - first) / ONE_WEEK);
    let guess = Math.max(1, diffWeeks + 1 + 2); // 약간 여유

    for (let round = guess; round >= 1; round--) {
      try {
        const hit = await fetchRound(round);
        return hit;
      } catch (e) {
        // 계속 아래로
      }
    }
    throw new Error("최신 회차를 찾지 못했습니다.");
  }

  async function preloadRecentRounds(latestRound, count = 180) {
    const start = Math.max(1, latestRound - count + 1);
    const arr = [];
    for (let r = latestRound; r >= start; r--) {
      try {
        const item = await fetchRound(r);
        arr.push(item);
      } catch (e) {
        // 실패 회차는 무시
      }
    }
    DRAW_DB = arr.sort((a, b) => b.round - a.round);
  }

  function initSummaryUI() {
    document.getElementById("currentDate").textContent = CURRENT_DRAW_DATE || "-";
    document.getElementById("currentRound").textContent = CURRENT_ROUND ? `${CURRENT_ROUND}회` : "-";
    document.getElementById("firstPrizeNumbers").textContent =
      CURRENT_FIRST_PRIZE.length ? CURRENT_FIRST_PRIZE.join(", ") : "-";
    document.getElementById("winnerCount").textContent =
      CURRENT_WINNER_COUNT != null ? `${CURRENT_WINNER_COUNT}명` : "-";
    document.getElementById("prizeAmount").textContent =
      CURRENT_PRIZE_AMOUNT != null ? formatMoneyKRW(CURRENT_PRIZE_AMOUNT) : "-";
    document.getElementById("nextDate").textContent = NEXT_DRAW_DATE || "-";
  }

  function fillComboCount() {
    comboCountEl.innerHTML = "";
    for (let i = 1; i <= 10; i++) {
      const op = document.createElement("option");
      op.value = i;
      op.textContent = i + "조합";
      comboCountEl.appendChild(op);
    }
    comboCountEl.value = "3";
  }

  function getBallClass(n) {
    if (n <= 10) return "yellow";
    if (n <= 20) return "sky";
    if (n <= 30) return "red";
    if (n <= 40) return "purple";
    return "green";
  }

  function plusNumbers(nums, step) {
    return nums.map(n => ((n - 1 + step) % 45) + 1);
  }

  function findSameDateHistory(baseDate) {
    const base = getMonthDay(baseDate);
    return DRAW_DB
      .filter(row => row.round !== CURRENT_ROUND)
      .filter(row => {
        const md = getMonthDay(row.date);
        return md.month === base.month && md.day === base.day;
      })
      .sort((a, b) => b.round - a.round);
  }

  function updateHistoryModeText() {
    const modeText = historyBaseDate === CURRENT_DRAW_DATE
      ? `${historyBaseDate} (현재 회차 날짜 기준)`
      : `${historyBaseDate} (다음 회차 날짜 기준)`;

    historyModeInfoEl.textContent = plusStep === 0
      ? `현재 불러오는 기준: ${modeText}`
      : `현재 불러오는 기준: ${modeText} · 번호 +${plusStep} 적용중`;
  }

  function renderHistory() {
    const rows = historyBaseDate ? findSameDateHistory(historyBaseDate) : [];
    updateHistoryModeText();

    if (!rows.length) {
      historyListEl.innerHTML = `<div class="empty">해당 날짜의 과거 데이터가 없습니다.</div>`;
      return;
    }

    historyListEl.innerHTML = rows.map(row => {
      const changed = plusNumbers(row.numbers, plusStep);
      return `
        <div class="history-item">
          <div class="history-head">
            <div class="history-round">${row.round}회</div>
            <div class="history-date">${row.date}</div>
          </div>
          <div class="num-zone">
            <div>
              <div class="mini-title">원본 번호</div>
              <div class="balls">
                ${row.numbers.map(n => `<span class="ball ${getBallClass(n)}">${n}</span>`).join("")}
              </div>
            </div>
            <div>
              ${plusStep === 0 ? "" : `
                <div class="mini-title">+${plusStep} 적용 번호</div>
                <div class="balls">
                  ${changed.map(n => `<span class="ball ${getBallClass(n)}">${n}</span>`).join("")}
                </div>
              `}
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderPicker() {
    numPickerEl.innerHTML = "";
    for (let i = 1; i <= 45; i++) {
      const el = document.createElement("div");
      el.className = "pick" + (manualNumbers.includes(i) ? " active" : "");
      el.textContent = i;
      el.addEventListener("click", () => {
        playClick("soft");
        toggleManual(i);
      });
      numPickerEl.appendChild(el);
    }
  }

  function renderManualSelected() {
    manualCountEl.textContent = `선택된 번호: ${manualNumbers.length}개`;
    selectedManualEl.innerHTML = manualNumbers.length
      ? [...manualNumbers].sort((a, b) => a - b).map(n => `<span class="chip">${n}</span>`).join("")
      : `<span class="chip">선택 없음</span>`;
  }

  function toggleManual(n) {
    if (manualNumbers.includes(n)) {
      manualNumbers = manualNumbers.filter(v => v !== n);
    } else {
      if (manualNumbers.length >= 6) {
        alert("수동번호는 최대 6개까지 선택할 수 있습니다.");
        return;
      }
      manualNumbers.push(n);
    }
    renderPicker();
    renderManualSelected();
    saveState(false);
  }

  function toggleManualBox() {
    manualBoxEl.classList.toggle("show");
    const isOpen = manualBoxEl.classList.contains("show");
    toggleManualBtnEl.textContent = isOpen ? "🙈 수동번호 입력창 닫기" : "📝 수동번호 입력창 열기";
  }

  function getSelectedOptions() {
    return [...document.querySelectorAll(".recOpt:checked")].map(el => el.value);
  }

  function frequencyMap(rows) {
    const freq = {};
    for (let i = 1; i <= 45; i++) freq[i] = 0;
    rows.forEach(r => r.numbers.forEach(n => freq[n]++));
    return freq;
  }

  function pickWeighted(freq, pool, preferHigh) {
    const items = pool.map(n => ({
      n,
      w: preferHigh ? (freq[n] + 1) : (1 / (freq[n] + 1))
    }));
    const total = items.reduce((s, x) => s + x.w, 0);
    let rand = Math.random() * total;
    for (const item of items) {
      rand -= item.w;
      if (rand <= 0) return item.n;
    }
    return items[items.length - 1].n;
  }

  function sum(arr) {
    return arr.reduce((a, b) => a + b, 0);
  }

  function isValidCombo(nums, opts) {
    const sorted = [...nums].sort((a, b) => a - b);

    if (opts.includes("oddEven")) {
      const odd = sorted.filter(n => n % 2 === 1).length;
      if (odd < 2 || odd > 4) return false;
    }

    if (opts.includes("highLow")) {
      const low = sorted.filter(n => n <= 22).length;
      if (low < 2 || low > 4) return false;
    }

    if (opts.includes("sumRange")) {
      const s = sum(sorted);
      if (s < 100 || s > 175) return false;
    }

    if (opts.includes("sectionMix")) {
      const s1 = sorted.filter(n => n <= 10).length;
      const s2 = sorted.filter(n => n >= 11 && n <= 20).length;
      const s3 = sorted.filter(n => n >= 21 && n <= 30).length;
      const s4 = sorted.filter(n => n >= 31).length;
      const used = [s1, s2, s3, s4].filter(v => v > 0).length;
      if (used < 3) return false;
    }

    for (let i = 0; i < sorted.length - 2; i++) {
      if (sorted[i] + 1 === sorted[i + 1] && sorted[i + 1] + 1 === sorted[i + 2]) {
        return false;
      }
    }
    return true;
  }

  function buildDateSet() {
    if (!NEXT_DRAW_DATE) return new Set();
    const [y, m, d] = NEXT_DRAW_DATE.split("-").map(Number);
    const s = new Set();
    [y % 100, m, d, m + d, (y % 10) + d].forEach(v => {
      if (v >= 1 && v <= 45) s.add(v);
    });
    return s;
  }

  function generateOneCombo(baseRows, opts, manualNums) {
    const freq = frequencyMap(baseRows);
    const current = DRAW_DB.find(v => v.round === CURRENT_ROUND);
    const avoidSet = new Set(opts.includes("avoidRepeat") && current ? current.numbers : []);
    const dateSet = buildDateSet();

    const combo = new Set(manualNums);
    let tries = 0;

    while (combo.size < 6 && tries < 600) {
      tries++;
      let pool = Array.from({ length: 45 }, (_, i) => i + 1).filter(n => !combo.has(n));

      if (opts.includes("avoidRepeat")) {
        const filtered = pool.filter(n => !avoidSet.has(n));
        if (filtered.length >= 6 - combo.size) pool = filtered;
      }

      let pick = null;

      if (opts.includes("dateMix") && Math.random() < 0.22) {
        const dp = [...dateSet].filter(n => pool.includes(n));
        if (dp.length) pick = dp[Math.floor(Math.random() * dp.length)];
      }

      if (!pick && opts.includes("hot")) {
        pick = pickWeighted(freq, pool, true);
      } else if (!pick && opts.includes("cold")) {
        pick = pickWeighted(freq, pool, false);
      } else if (!pick) {
        pick = pool[Math.floor(Math.random() * pool.length)];
      }

      combo.add(pick);

      if (tries > 120 && combo.size < 6) {
        combo.clear();
        manualNums.forEach(n => combo.add(n));
      }
    }

    const arr = [...combo].sort((a, b) => a - b);
    if (arr.length !== 6) return null;
    if (!isValidCombo(arr, opts)) return null;
    return arr;
  }

  function renderTags(opts, manualNums) {
    const map = {
      hot: "자주 나온 번호",
      cold: "덜 나온 번호",
      oddEven: "홀짝 균형",
      highLow: "고저 균형",
      sumRange: "합계 범위",
      avoidRepeat: "최근 회차 반복 줄이기",
      sectionMix: "구간 분산",
      dateMix: "날짜 숫자 반영"
    };

    const tags = [];
    tags.push(manualNums.length ? `수동번호 포함: ${manualNums.sort((a,b)=>a-b).join(", ")}` : "수동번호 없음");
    if (opts.length) opts.forEach(o => tags.push(map[o]));
    else tags.push("기본 랜덤 생성");

    tagRowEl.innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join("");
  }

  function generateCombos() {
    const opts = getSelectedOptions();
    const comboCount = Number(comboCountEl.value || 1);
    const baseRows = DRAW_DB.filter(row => row.round !== CURRENT_ROUND);
    const manualNums = [...manualNumbers].sort((a, b) => a - b);

    renderTags(opts, manualNums);

    const results = [];
    const seen = new Set();
    let safe = 0;

    while (results.length < comboCount && safe < 5000) {
      safe++;
      const combo = generateOneCombo(baseRows, opts, manualNums);
      if (!combo) continue;
      const key = combo.join(",");
      if (!seen.has(key)) {
        seen.add(key);
        results.push(combo);
      }
    }

    lastGeneratedCombos = results;

    if (!results.length) {
      resultBoxEl.textContent = "번호를 만들지 못했습니다. 수동번호를 줄이거나 옵션을 바꿔보세요.";
      return;
    }

    resultBoxEl.textContent = results.map((row, idx) => `${idx + 1}조합  :  ${row.join(" , ")}`).join("\n");
    saveState(false);
  }

  function saveSelectedNumbers() {
    const payload = {
      manualNumbers: [...manualNumbers].sort((a,b)=>a-b),
      savedAt: new Date().toLocaleString("ko-KR")
    };
    localStorage.setItem(SAVED_NUMBERS_KEY, JSON.stringify(payload));
    alert(payload.manualNumbers.length
      ? `선택번호 저장 완료: ${payload.manualNumbers.join(", ")}`
      : "현재 선택된 수동번호가 없어 빈 상태로 저장되었습니다.");
  }

  function checkWinning() {
    const firstPrize = [...CURRENT_FIRST_PRIZE].sort((a,b)=>a-b);
    const selected = [...manualNumbers].sort((a,b)=>a-b);

    if (selected.length === 6) {
      const isWin = JSON.stringify(selected) === JSON.stringify(firstPrize);
      checkBoxEl.textContent = isWin
        ? `🎉 축하합니다! 선택한 수동번호 ${selected.join(", ")} 가 현재 1등 번호와 일치합니다!`
        : `😊 수동번호 ${selected.join(", ")} 는 현재 1등 번호 ${firstPrize.join(", ")} 와 일치하지 않습니다.`;
      return;
    }

    if (lastGeneratedCombos.length) {
      const exact = lastGeneratedCombos.find(c =>
        JSON.stringify([...c].sort((a,b)=>a-b)) === JSON.stringify(firstPrize)
      );
      checkBoxEl.textContent = exact
        ? `🎉 생성된 조합 중 당첨번호와 일치한 조합이 있습니다: ${exact.join(", ")}`
        : `😊 생성된 조합 ${lastGeneratedCombos.length}개 중 현재 1등 번호와 완전일치한 조합은 없습니다.`;
      return;
    }

    checkBoxEl.textContent = "먼저 수동번호 6개를 선택하거나 번호 생성을 해주세요.";
  }

  function clearManual() {
    manualNumbers = [];
    renderPicker();
    renderManualSelected();
    saveState(false);
  }

  function resetResult() {
    tagRowEl.innerHTML = "";
    resultBoxEl.textContent = "여기에 추천 번호가 표시됩니다.";
    checkBoxEl.textContent = "여기에 당첨 확인 결과가 표시됩니다.";
    lastGeneratedCombos = [];
    saveState(false);
  }

  function saveState(showAlert = false) {
    const state = {
      plusStep,
      manualNumbers,
      comboCount: comboCountEl.value,
      opts: getSelectedOptions(),
      result: resultBoxEl.textContent,
      tags: tagRowEl.innerHTML,
      historyBaseDate,
      manualOpen: manualBoxEl.classList.contains("show")
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    if (showAlert) alert("저장되었습니다.");
  }

  function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    try {
      const data = JSON.parse(raw);
      plusStep = Number(data.plusStep || 0);
      manualNumbers = Array.isArray(data.manualNumbers) ? data.manualNumbers : [];
      comboCountEl.value = data.comboCount || "3";
      historyBaseDate = data.historyBaseDate || null;
      document.querySelectorAll(".recOpt").forEach(el => {
        el.checked = (data.opts || []).includes(el.value);
      });
      if (data.result) resultBoxEl.textContent = data.result;
      if (data.tags) tagRowEl.innerHTML = data.tags;
      if (data.manualOpen) {
        manualBoxEl.classList.add("show");
        toggleManualBtnEl.textContent = "🙈 수동번호 입력창 닫기";
      }
    } catch (e) {}
  }

  function playClick(type = "normal") {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      if (!window._clickCtx) window._clickCtx = new AudioCtx();
      const ctx = window._clickCtx;
      if (ctx.state === "suspended") ctx.resume();

      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(type === "soft" ? 520 : 680, now);
      osc.frequency.exponentialRampToValueAtTime(type === "soft" ? 320 : 420, now + 0.08);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.04, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.12);
    } catch (e) {}
  }

  document.querySelectorAll("button.sfx").forEach(btn => {
    btn.addEventListener("click", () => playClick("normal"));
  });

  document.querySelectorAll(".recOpt").forEach(el => {
    el.addEventListener("change", () => {
      playClick("soft");
      saveState(false);
    });
  });

  document.getElementById("nextPlusBtn").addEventListener("click", () => {
    plusStep++;
    renderHistory();
    saveState(false);
  });

  document.getElementById("nextRoundBtn").addEventListener("click", () => {
    historyBaseDate = NEXT_DRAW_DATE;
    plusStep = 0;
    renderHistory();
    saveState(false);
  });

  document.getElementById("resetPlusBtn").addEventListener("click", () => {
    historyBaseDate = CURRENT_DRAW_DATE;
    plusStep = 0;
    renderHistory();
    saveState(false);
  });

  document.getElementById("toggleManualBtn").addEventListener("click", () => {
    toggleManualBox();
    saveState(false);
  });

  document.getElementById("clearManualBtn").addEventListener("click", clearManual);
  document.getElementById("saveSelectedBtn").addEventListener("click", saveSelectedNumbers);
  document.getElementById("generateBtn").addEventListener("click", generateCombos);
  document.getElementById("checkWinBtn").addEventListener("click", checkWinning);
  document.getElementById("resetResultBtn").addEventListener("click", resetResult);
  comboCountEl.addEventListener("change", () => saveState(false));

  async function initLiveData() {
    try {
      const latest = await findLatestRound();
      CURRENT_ROUND = latest.round;
      CURRENT_DRAW_DATE = latest.date;
      CURRENT_FIRST_PRIZE = latest.numbers;
      CURRENT_WINNER_COUNT = latest.firstPrizeWinnerCount;
      CURRENT_PRIZE_AMOUNT = latest.firstPrizeAmount;
      NEXT_DRAW_DATE = addDays(CURRENT_DRAW_DATE, 7);

      await preloadRecentRounds(CURRENT_ROUND, 220);

      if (!historyBaseDate) historyBaseDate = CURRENT_DRAW_DATE;

      initSummaryUI();
      renderHistory();
      renderPicker();
      renderManualSelected();
      checkBoxEl.textContent = "인터넷에서 최신 데이터를 불러왔습니다.";
    } catch (err) {
      console.error(err);
      initSummaryUI();
      historyListEl.innerHTML = `<div class="empty">인터넷에서 최신 데이터를 불러오지 못했습니다.</div>`;
      checkBoxEl.textContent = "최신 데이터 조회 실패. 네트워크 또는 브라우저 설정을 확인해주세요.";
    }
  }

  async function init() {
    fillComboCount();
    loadState();
    renderPicker();
    renderManualSelected();
    makePetals();
    await initLiveData();
  }

  init();
</script>
