<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 대박 로또 당첨기 - 분석 & 관리형</title>
    <style>
        :root { --main-pink: #ff7bb4; --soft-pink: #fff2f8; --text: #6c4a5d; --border: #f4d8e5; }
        body { background: var(--soft-pink); font-family: 'Pretendard', sans-serif; color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: white; border-radius: 20px; border: 1px solid var(--border); padding: 18px; width: 100%; max-width: 600px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(255,182,193,0.15); box-sizing: border-box; }
        h1 { color: #ff5fa5; font-size: 22px; margin: 0 0 5px; text-align: center; }
        h3 { margin-top: 0; color: #ff5fa5; font-size: 16px; border-bottom: 1px solid #fdf0f6; padding-bottom: 8px; margin-bottom: 12px; }

        /* 대시보드 */
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .info-box { background: #fffafc; border: 1px solid #fdf0f6; padding: 10px; border-radius: 12px; text-align: center; }
        .info-box label { font-size: 10px; color: #b0899d; display: block; margin-bottom: 4px; }
        .info-box div { font-weight: bold; font-size: 13px; color: #444; }

        /* 분석 옵션 */
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .option-item { background: #fdfdfd; border: 1px solid #eee; padding: 10px; border-radius: 10px; font-size: 12px; display: flex; align-items: center; gap: 6px; }

        /* 버튼 */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-blue { background: #e3f2fd; color: #1e88e5; }
        .btn-gold { background: #fff8e1; color: #fbc02d; }
        .btn-mint { background: #e0f2f1; color: #00897b; }
        .btn-main { background: var(--main-pink); color: white; width: 100%; padding: 16px; font-size: 16px; margin-top: 10px; border-radius: 15px; }

        /* 번호 선택 (수동 입력용) */
        .num-picker { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; margin-top: 10px; }
        .num-btn { border: 1px solid #eee; padding: 8px 0; text-align: center; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .num-btn.active { background: var(--main-pink); color: white; border-color: var(--main-pink); }

        /* 저장 목록 */
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .save-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #fafafa; align-items: center; }
        .ball-group { display: flex; gap: 4px; }
        .ball { width: 26px; height: 26px; border-radius: 50%; background: #ff7bb4; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .rank-tag { font-size: 10px; padding: 3px 7px; border-radius: 5px; background: #eee; min-width: 40px; text-align: center; }
        .rank-tag.win { background: #ffedf5; color: #ff5fa5; font-weight: bold; }

        /* 간략히 보기 모드 스타일 */
        .compact-item { font-size: 12px; padding: 6px 0; border-bottom: 1px dotted #eee; display: flex; justify-content: space-between; }

        #loading { text-align: center; font-size: 12px; color: #ff7bb4; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="card" style="border:none; background:transparent; box-shadow:none;">
        <h1>🌸 대박 로또 당첨기</h1>
        <p style="text-align:center; font-size:12px; color:#a27088; margin:0;">1220회차 기반 5대 패턴 분석 시스템</p>
    </div>

    <div class="card">
        <h3>💖 실시간 자동화 정보</h3>
        <div id="loading">데이터 분석 중...</div>
        <div class="info-grid" id="dashboard" style="display:none;">
            <div class="info-box"><label>기준 회차</label><div id="drawNo">-</div></div>
            <div class="info-box"><label>추첨일</label><div id="drawDate">-</div></div>
            <div class="info-box"><label>1등 번호</label><div id="drawNums" style="font-size:11px;">-</div></div>
            <div class="info-box"><label>당첨자수</label><div id="winCount">-</div></div>
            <div class="info-box"><label>당첨금액</label><div id="winPrice">-</div></div>
            <div class="info-box"><label>분석상태</label><div style="color:green;">정상</div></div>
        </div>
    </div>

    <div class="card">
        <h3>🎀 패턴 분석 설정</h3>
        <div class="option-grid">
            <div class="option-item"><input type="checkbox" checked> 1) 선형 흐름 패턴</div>
            <div class="option-item"><input type="checkbox" checked> 2) 재출현(이월) 분석</div>
            <div class="option-item"><input type="checkbox" checked> 3) 낙첨 간격 분석</div>
            <div class="option-item"><input type="checkbox" checked> 4) 과거 동일날짜 +1</div>
            <div class="option-item"><input type="checkbox" checked> 5) 최저 시작수 패턴</div>
        </div>
        
        <div id="pickerArea" style="display:none;">
            <div class="num-picker" id="numPicker"></div>
        </div>

        <div class="btn-row">
            <button class="btn btn-blue" onclick="togglePicker()">📝 수동 입력</button>
            <button class="btn btn-gold" onclick="resetSelection()">🧹 선택 초기화</button>
            <button class="btn btn-mint" onclick="saveManual()">💾 수동 저장</button>
        </div>
        <button class="btn btn-main" onclick="generateSmartNumbers()">🎲 분석 기반 번호 생성 + 자동 저장</button>
    </div>

    <div class="card">
        <div class="list-header">
            <h3>📂 저장된 번호 목록</h3>
            <button class="btn" id="viewModeBtn" style="padding:4px 8px; font-size:10px; background:#f0f0f0;" onclick="toggleViewMode()">📱 간략히 보기</button>
        </div>
        <button class="btn btn-mint" style="width:100%; margin-bottom:12px;" onclick="checkAllResults()">🔍 전체 저장 번호 일괄 당첨 확인</button>
        <div id="saveList">
            <p style="text-align:center; color:#ccc; font-size:12px; padding:20px;">내역이 없습니다.</p>
        </div>
        <button class="btn" style="background:#fff; border:1px solid #eee; color:#bbb; width:100%; margin-top:15px; font-size:11px;" onclick="clearAll()">🗑️ 전체 내역 삭제</button>
    </div>

    <script>
        const STORAGE_KEY = "daebak_lotto_final";
        let allData = [];
        let manualNums = [];
        let isCompact = false;

        // 1. 데이터 로드 및 대시보드 세팅
        async function init() {
            try {
                const res = await fetch("https://smok95.github.io/lotto/results/all.json");
                allData = await res.json();
                const latest = allData[0];
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                document.getElementById('drawNo').textContent = latest.draw_no + "회";
                document.getElementById('drawDate').textContent = latest.draw_date.slice(5);
                document.getElementById('drawNums').textContent = latest.numbers.join(",");
                document.getElementById('winCount').textContent = latest.win_count + "명";
                document.getElementById('winPrice').textContent = Math.round(latest.win_price/100000000) + "억";
                
                renderPicker();
                renderList();
            } catch(e) {
                document.getElementById('loading').textContent = "데이터 연동 오류";
            }
        }

        // 2. 수동 선택 UI
        function renderPicker() {
            const container = document.getElementById('numPicker');
            for(let i=1; i<=45; i++) {
                const b = document.createElement('div');
                b.className = 'num-btn';
                b.textContent = i;
                b.id = `num-${i}`;
                b.onclick = () => {
                    if(manualNums.includes(i)) {
                        manualNums = manualNums.filter(n => n !== i);
                        b.classList.remove('active');
                    } else if(manualNums.length < 6) {
                        manualNums.push(i);
                        b.classList.add('active');
                    }
                };
                container.appendChild(b);
            }
        }

        function togglePicker() {
            const area = document.getElementById('pickerArea');
            area.style.display = area.style.display === 'none' ? 'block' : 'none';
        }

        function resetSelection() {
            manualNums = [];
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        }

        // 3. 5대 분석 알고리즘 기반 생성
        function generateSmartNumbers() {
            if(!allData.length) return;
            const latest = allData[0].numbers;
            const prev = allData[1].numbers;
            
            let candidates = new Set();

            // 패턴1&2: 이월수 및 재출현 (최근 2주에서 1~2개 추출)
            candidates.add(latest[Math.floor(Math.random()*6)]);
            candidates.add(prev[Math.floor(Math.random()*6)]);

            // 패턴4: 과거 동일 날짜 패턴 (가상 로직: 오늘 날짜 기준 +1)
            const dayIdx = new Date().getDate() % 6;
            candidates.add((latest[dayIdx] % 45) + 1);

            // 패턴5: 최저수 패턴 (보통 1~10 사이)
            candidates.add(Math.floor(Math.random() * 10) + 1);

            // 나머지 채우기
            while(candidates.size < 6) {
                candidates.add(Math.floor(Math.random() * 45) + 1);
            }

            const result = Array.from(candidates).sort((a,b)=>a-b);
            saveData(result);
            alert("분석 기반 번호가 생성 및 저장되었습니다.");
        }

        function saveManual() {
            if(manualNums.length !== 6) return alert("6개 번호를 선택해주세요.");
            saveData([...manualNums].sort((a,b)=>a-b));
            resetSelection();
            alert("수동 번호가 저장되었습니다.");
        }

        // 4. 저장 및 목록 관리
        function saveData(nums) {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            history.unshift({ nums: nums, result: null, date: new Date().toLocaleDateString() });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            renderList();
        }

        function renderList() {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            const container = document.getElementById('saveList');
            if(!history.length) {
                container.innerHTML = '<p style="text-align:center; color:#ccc; font-size:12px; padding:20px;">내역이 없습니다.</p>';
                return;
            }

            container.innerHTML = history.map(item => {
                if(isCompact) {
                    return `<div class="compact-item"><span><b>${item.nums.join(", ")}</b></span> <span style="color:#ff5fa5">${item.result || '-'}</span></div>`;
                }
                return `
                    <div class="save-item">
                        <div class="ball-group">
                            ${item.nums.map(n => `<div class="ball">${n}</div>`).join('')}
                        </div>
                        <div class="rank-tag ${item.result && item.result !== '낙첨' ? 'win' : ''}">${item.result || '확인대기'}</div>
                    </div>
                `;
            }).join('');
        }

        // 5. 일괄 확인 및 기타
        function checkAllResults() {
            if(!allData.length) return;
            const win = allData[0].numbers;
            const bonus = allData[0].bonus_no;
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

            const updated = history.map(h => {
                const match = h.nums.filter(n => win.includes(n)).length;
                let r = "낙첨";
                if(match === 6) r = "1등";
                else if(match === 5 && h.nums.includes(bonus)) r = "2등";
                else if(match === 5) r = "3등";
                else if(match === 4) r = "4등";
                else if(match === 3) r = "5등";
                return {...h, result: r};
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
            renderList();
        }

        function toggleViewMode() {
            isCompact = !isCompact;
            document.getElementById('viewModeBtn').textContent = isCompact ? "📋 자세히 보기" : "📱 간략히 보기";
            renderList();
        }

        function clearAll() {
            if(confirm("모든 내역을 지울까요?")) {
                localStorage.removeItem(STORAGE_KEY);
                renderList();
            }
        }

        init();
    </script>
</body>
</html>
