<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대박 로또 당첨기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f4f7fb;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #111827;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }
    .title {
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      margin: 10px 0 18px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
      padding: 16px;
      margin-bottom: 16px;
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .info-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 14px;
      padding: 14px;
    }
    .info-label {
      font-size: 12px;
      color: #2563eb;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .info-value {
      font-size: 20px;
      font-weight: 800;
      color: #1e3a8a;
    }

    .subtxt {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
      margin-top: 6px;
    }

    .history-wrap {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .history-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
      background: #fafafa;
    }
    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }
    .history-round {
      font-weight: 800;
      font-size: 17px;
    }
    .history-date {
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
    }
    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ball {
      min-width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #2563eb;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 15px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    button, select {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 800;
    }
    .btn-main {
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    .btn-sub {
      background: #10b981;
      color: #fff;
      cursor: pointer;
    }
    .btn-light {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #d1d5db;
      cursor: pointer;
    }
    .btn-danger {
      background: #ef4444;
      color: #fff;
      cursor: pointer;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .opt {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
    }
    .opt input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .gen-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: end;
    }
    .select-wrap label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #374151;
    }
    select {
      border: 1px solid #d1d5db;
      background: #fff;
    }

    .applied-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 14px;
      padding: 12px;
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
      color: #166534;
    }

    .result-box {
      background: #0f172a;
      color: #fff;
      border-radius: 16px;
      min-height: 120px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.9;
      white-space: pre-line;
    }

    .empty {
      padding: 12px;
      border-radius: 12px;
      background: #f9fafb;
      color: #6b7280;
      font-size: 14px;
      border: 1px dashed #d1d5db;
    }

    @media (max-width: 760px) {
      .info-grid, .gen-box, .btn-row {
        grid-template-columns: 1fr;
      }
      .title { font-size: 24px; }
      .info-value { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">대박 로또 당첨기</div>

    <div class="card">
      <h2>자동 회차 정보</h2>
      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">기준 회차</div>
          <div class="info-value" id="currentRound">1215회</div>
        </div>
        <div class="info-box">
          <div class="info-label">기준 추첨일</div>
          <div class="info-value" id="currentDate">2026-03-14</div>
        </div>
        <div class="info-box">
          <div class="info-label">다음 회차 추첨일</div>
          <div class="info-value" id="nextDate">2026-03-21</div>
        </div>
      </div>
      <div class="subtxt">
        회차와 날짜는 자동 표시됩니다. 사용자가 직접 선택하지 않습니다.
      </div>
    </div>

    <div class="card">
      <h2>같은 날짜 과거 데이터 자동 찾기</h2>
      <div class="subtxt">
        기준 추첨일과 같은 월/일의 과거 회차를 자동으로 보여주고, <b>+1 적용</b> 버튼을 누를 때마다 추천 계산에 한 개씩 추가됩니다.
      </div>

      <div class="history-wrap" id="historyList"></div>

      <div class="btn-row">
        <button class="btn-sub" id="addPastBtn">+1 적용</button>
        <button class="btn-light" id="resetPastBtn">적용 초기화</button>
      </div>

      <div class="applied-box" id="appliedInfo">
        현재 적용된 같은 날짜 과거 데이터: 0개
      </div>
    </div>

    <div class="card">
      <h2>추천 옵션</h2>
      <div class="option-grid">
        <label class="opt"><input type="checkbox" class="recOpt" value="hot"> 자주 나온 번호</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="cold"> 덜 나온 번호</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="oddEven"> 홀짝 균형</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="highLow"> 고저 균형</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="sumRange"> 합계 범위</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="avoidRepeat"> 직전 회차 반복 줄이기</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="sectionMix"> 구간 분산</label>
        <label class="opt"><input type="checkbox" class="recOpt" value="dateMix"> 날짜 숫자 반영</label>
      </div>

      <div class="gen-box">
        <div class="select-wrap">
          <label for="comboCount">조합 수</label>
          <select id="comboCount"></select>
        </div>
        <div>
          <button class="btn-main" id="generateBtn">번호 생성</button>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-danger" id="resetAllBtn">전체 초기화</button>
        <button class="btn-light" id="saveBtn">현재 상태 저장</button>
      </div>
    </div>

    <div class="card">
      <h2>추천 결과</h2>
      <div class="result-box" id="resultBox">여기에 추천 번호가 표시됩니다.</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "daebak_lotto_auto_same_date_v2";

    // 기준값 (방운님 요청 반영)
    const CURRENT_ROUND = 1215;
    const CURRENT_DRAW_DATE = "2026-03-14";
    const NEXT_DRAW_DATE = "2026-03-21";

    // 샘플 회차 데이터
    // 실제 자동 API 연동 전까지 내부 데이터로 같은 날짜 과거 회차를 찾는 구조
    const DRAW_DB = [
      { round: 1215, date: "2026-03-14", numbers: [7, 12, 23, 28, 34, 41] },
      { round: 1163, date: "2025-03-15", numbers: [2, 9, 16, 21, 29, 38] },
      { round: 1111, date: "2024-03-16", numbers: [5, 11, 19, 27, 31, 44] },
      { round: 1059, date: "2023-03-11", numbers: [8, 14, 22, 26, 35, 40] },
      { round: 1007, date: "2022-03-12", numbers: [1, 6, 18, 24, 33, 42] },
      { round: 955,  date: "2021-03-13", numbers: [4, 10, 17, 25, 36, 43] },
      { round: 903,  date: "2020-03-14", numbers: [3, 13, 20, 30, 37, 45] },
      { round: 851,  date: "2019-03-16", numbers: [7, 15, 21, 28, 32, 39] },
      { round: 799,  date: "2018-03-17", numbers: [9, 12, 18, 27, 34, 40] },
      { round: 747,  date: "2017-03-11", numbers: [6, 14, 23, 29, 38, 41] },
      { round: 695,  date: "2016-03-12", numbers: [5, 16, 24, 31, 35, 44] },
      { round: 643,  date: "2015-03-14", numbers: [2, 8, 19, 26, 33, 42] },
      { round: 591,  date: "2014-03-15", numbers: [1, 11, 20, 28, 36, 43] },
      { round: 539,  date: "2013-03-16", numbers: [4, 13, 22, 30, 39, 45] },
      { round: 487,  date: "2012-03-17", numbers: [3, 9, 17, 25, 34, 40] },
      { round: 435,  date: "2011-03-12", numbers: [6, 10, 18, 27, 32, 41] },
      { round: 383,  date: "2010-03-13", numbers: [7, 14, 21, 29, 37, 44] },
      { round: 331,  date: "2009-03-14", numbers: [5, 12, 19, 24, 35, 42] },
      { round: 279,  date: "2008-03-15", numbers: [8, 15, 23, 31, 38, 43] },
      { round: 227,  date: "2007-03-17", numbers: [2, 11, 20, 26, 33, 45] },
      { round: 175,  date: "2006-03-11", numbers: [1, 9, 16, 22, 30, 39] }
    ];

    const currentRoundEl = document.getElementById("currentRound");
    const currentDateEl = document.getElementById("currentDate");
    const nextDateEl = document.getElementById("nextDate");
    const historyListEl = document.getElementById("historyList");
    const appliedInfoEl = document.getElementById("appliedInfo");
    const comboCountEl = document.getElementById("comboCount");
    const resultBoxEl = document.getElementById("resultBox");

    let sameDateHistory = [];
    let appliedPastCount = 0;

    function initTopInfo() {
      currentRoundEl.textContent = `${CURRENT_ROUND}회`;
      currentDateEl.textContent = CURRENT_DRAW_DATE;
      nextDateEl.textContent = NEXT_DRAW_DATE;
    }

    function fillComboCount() {
      comboCountEl.innerHTML = "";
      for (let i = 1; i <= 10; i++) {
        const op = document.createElement("option");
        op.value = i;
        op.textContent = `${i}조합`;
        comboCountEl.appendChild(op);
      }
      comboCountEl.value = "3";
    }

    function getMonthDay(dateStr) {
      const [y, m, d] = dateStr.split("-").map(Number);
      return { month: m, day: d };
    }

    function findSameDateHistory(baseDate) {
      const base = getMonthDay(baseDate);
      return DRAW_DB
        .filter(item => item.round !== CURRENT_ROUND)
        .filter(item => {
          const md = getMonthDay(item.date);
          return md.month === base.month && Math.abs(md.day - base.day) <= 3;
        })
        .sort((a, b) => b.round - a.round);
    }

    function renderHistory() {
      if (!sameDateHistory.length) {
        historyListEl.innerHTML = `<div class="empty">같은 날짜 과거 데이터가 없습니다.</div>`;
        return;
      }

      historyListEl.innerHTML = sameDateHistory.map((item, idx) => {
        const active = idx < appliedPastCount;
        return `
          <div class="history-item" style="${active ? 'border:2px solid #10b981;background:#ecfdf5;' : ''}">
            <div class="history-top">
              <div class="history-round">${item.round}회</div>
              <div class="history-date">${item.date} ${active ? ' · 적용중' : ''}</div>
            </div>
            <div class="balls">
              ${item.numbers.map(n => `<span class="ball">${n}</span>`).join("")}
            </div>
          </div>
        `;
      }).join("");
    }

    function updateAppliedInfo() {
      appliedInfoEl.textContent = `현재 적용된 같은 날짜 과거 데이터: ${appliedPastCount}개`;
    }

    function getSelectedOptions() {
      return [...document.querySelectorAll(".recOpt:checked")].map(el => el.value);
    }

    function getAppliedRows() {
      return sameDateHistory.slice(0, appliedPastCount);
    }

    function frequencyMap(rows) {
      const freq = {};
      for (let i = 1; i <= 45; i++) freq[i] = 0;
      rows.forEach(r => {
        r.numbers.forEach(n => freq[n]++);
      });
      return freq;
    }

    function pickWeighted(freq, pool, preferHigh = true) {
      const items = pool.map(n => ({
        n,
        w: preferHigh ? (freq[n] + 1) : (1 / (freq[n] + 1))
      }));
      const total = items.reduce((a, b) => a + b.w, 0);
      let rand = Math.random() * total;
      for (const item of items) {
        rand -= item.w;
        if (rand <= 0) return item.n;
      }
      return items[items.length - 1].n;
    }

    function sum(arr) {
      return arr.reduce((a, b) => a + b, 0);
    }

    function isValidCombo(nums, opts) {
      const sorted = [...nums].sort((a, b) => a - b);

      if (opts.includes("oddEven")) {
        const odd = sorted.filter(n => n % 2 === 1).length;
        if (odd < 2 || odd > 4) return false;
      }

      if (opts.includes("highLow")) {
        const low = sorted.filter(n => n <= 22).length;
        if (low < 2 || low > 4) return false;
      }

      if (opts.includes("sumRange")) {
        const s = sum(sorted);
        if (s < 100 || s > 175) return false;
      }

      if (opts.includes("sectionMix")) {
        const a = sorted.filter(n => n <= 10).length;
        const b = sorted.filter(n => n >= 11 && n <= 20).length;
        const c = sorted.filter(n => n >= 21 && n <= 30).length;
        const d = sorted.filter(n => n >= 31).length;
        const used = [a,b,c,d].filter(v => v > 0).length;
        if (used < 3) return false;
      }

      for (let i = 0; i < sorted.length - 2; i++) {
        if (sorted[i] + 1 === sorted[i+1] && sorted[i+1] + 1 === sorted[i+2]) {
          return false;
        }
      }

      return true;
    }

    function generateOneCombo(rows, opts) {
      const freq = frequencyMap(rows);
      const current = DRAW_DB.find(v => v.round === CURRENT_ROUND);
      const avoidSet = new Set(opts.includes("avoidRepeat") && current ? current.numbers : []);
      const [y, m, d] = NEXT_DRAW_DATE.split("-").map(Number);
      const dateSet = new Set();
      if (opts.includes("dateMix")) {
        [y % 100, m, d, m + d, (y % 10) + d].forEach(v => {
          if (v >= 1 && v <= 45) dateSet.add(v);
        });
      }

      const combo = new Set();
      let tries = 0;

      while (combo.size < 6 && tries < 500) {
        tries++;
        let pool = Array.from({ length: 45 }, (_, i) => i + 1).filter(n => !combo.has(n));

        if (opts.includes("avoidRepeat")) {
          const filtered = pool.filter(n => !avoidSet.has(n));
          if (filtered.length >= 6 - combo.size) pool = filtered;
        }

        let pick = null;

        if (opts.includes("dateMix") && Math.random() < 0.22) {
          const pool2 = [...dateSet].filter(n => pool.includes(n));
          if (pool2.length) pick = pool2[Math.floor(Math.random() * pool2.length)];
        }

        if (!pick && opts.includes("hot")) {
          pick = pickWeighted(freq, pool, true);
        } else if (!pick && opts.includes("cold")) {
          pick = pickWeighted(freq, pool, false);
        } else if (!pick) {
          pick = pool[Math.floor(Math.random() * pool.length)];
        }

        combo.add(pick);

        if (tries > 100 && combo.size < 6) combo.clear();
      }

      const arr = [...combo].sort((a, b) => a - b);
      if (arr.length !== 6) return null;
      if (!isValidCombo(arr, opts)) return null;
      return arr;
    }

    function generateCombos() {
      const opts = getSelectedOptions();
      const comboCount = Number(comboCountEl.value || 1);
      const appliedRows = getAppliedRows();

      if (!appliedRows.length) {
        resultBoxEl.textContent = "먼저 +1 적용 버튼을 눌러 같은 날짜 과거 데이터를 적용해주세요.";
        return;
      }

      const results = [];
      const seen = new Set();
      let safe = 0;

      while (results.length < comboCount && safe < 4000) {
        safe++;
        const combo = generateOneCombo(appliedRows, opts);
        if (!combo) continue;

        const key = combo.join(",");
        if (!seen.has(key)) {
          seen.add(key);
          results.push(combo);
        }
      }

      if (!results.length) {
        resultBoxEl.textContent = "번호를 만들지 못했습니다. 적용 개수를 늘리거나 옵션을 줄여보세요.";
        return;
      }

      resultBoxEl.textContent = results
        .map((row, idx) => `${idx + 1}조합  :  ${row.join(" , ")}`)
        .join("\n");
    }

    function saveState() {
      const state = {
        appliedPastCount,
        comboCount: comboCountEl.value,
        opts: getSelectedOptions(),
        result: resultBoxEl.textContent
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      alert("저장되었습니다.");
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        appliedPastCount = Number(data.appliedPastCount || 0);
        comboCountEl.value = data.comboCount || "3";
        document.querySelectorAll(".recOpt").forEach(el => {
          el.checked = (data.opts || []).includes(el.value);
        });
        if (data.result) resultBoxEl.textContent = data.result;
      } catch (e) {}
    }

    function resetApplied() {
      appliedPastCount = 0;
      renderHistory();
      updateAppliedInfo();
      resultBoxEl.textContent = "여기에 추천 번호가 표시됩니다.";
    }

    function resetAll() {
      localStorage.removeItem(STORAGE_KEY);
      appliedPastCount = 0;
      comboCountEl.value = "3";
      document.querySelectorAll(".recOpt").forEach(el => el.checked = false);
      renderHistory();
      updateAppliedInfo();
      resultBoxEl.textContent = "여기에 추천 번호가 표시됩니다.";
    }

    document.getElementById("addPastBtn").addEventListener("click", () => {
      if (appliedPastCount < sameDateHistory.length) {
        appliedPastCount++;
        renderHistory();
        updateAppliedInfo();
      } else {
        alert("더 적용할 같은 날짜 과거 데이터가 없습니다.");
      }
    });

    document.getElementById("resetPastBtn").addEventListener("click", resetApplied);
    document.getElementById("generateBtn").addEventListener("click", generateCombos);
    document.getElementById("resetAllBtn").addEventListener("click", resetAll);
    document.getElementById("saveBtn").addEventListener("click", saveState);

    function init() {
      initTopInfo();
      fillComboCount();
      sameDateHistory = findSameDateHistory(CURRENT_DRAW_DATE);
      loadState();
      renderHistory();
      updateAppliedInfo();
    }

    init();
  </script>
</body>
</html>
