<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대박 로또 당첨기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin: 8px 0 20px;
      color: #111827;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      border: 1px solid #e5e7eb;
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }
    .col-12 { grid-column: span 12; }
    .col-6 { grid-column: span 6; }
    .col-4 { grid-column: span 4; }
    .col-3 { grid-column: span 3; }
    .col-2 { grid-column: span 2; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #374151;
    }
    input, select, button {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 15px;
      background: #fff;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    .btn {
      cursor: pointer;
      border: none;
      font-weight: 700;
      transition: 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-secondary {
      background: #10b981;
      color: #fff;
    }
    .btn-light {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #d1d5db;
    }
    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    .muted {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
    .info-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      border-radius: 14px;
      padding: 12px;
      font-weight: 700;
    }
    .data-row {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }
    .num-inputs {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }
    .option-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 10px 12px;
      border-radius: 12px;
      font-weight: 600;
    }
    .option-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
    }
    .result-box {
      min-height: 120px;
      background: #0f172a;
      color: #fff;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.9;
      white-space: pre-line;
    }
    .row-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .small-btn {
      width: auto;
      padding: 9px 12px;
      font-size: 13px;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 13px;
      font-weight: 700;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    @media (max-width: 768px) {
      .col-6, .col-4, .col-3, .col-2 { grid-column: span 12; }
      .num-inputs { grid-template-columns: repeat(3, 1fr); }
      .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">대박 로또 당첨기</div>

    <div class="card">
      <h2>조건 선택</h2>
      <div class="grid">
        <div class="col-4">
          <label>기준 회차</label>
          <input type="number" id="lastRound" min="1" value="1161" />
        </div>
        <div class="col-4">
          <label>기준 추첨일</label>
          <input type="date" id="lastDrawDate" />
        </div>
        <div class="col-4">
          <label>다음 회차 추첨일</label>
          <input type="date" id="targetDate" />
        </div>

        <div class="col-6">
          <label>목표 회차</label>
          <input type="number" id="targetRound" readonly />
        </div>
        <div class="col-6">
          <label>조합 수</label>
          <select id="comboCount"></select>
        </div>

        <div class="col-12">
          <div class="info-box" id="targetInfo">다음 회차 정보 계산 중...</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>과거 회차 데이터 입력</h2>
      <div class="muted" style="margin-bottom:10px;">
        같은 날짜의 과거 회차도 여러 개 유지할 수 있습니다. 아래 <b>+1 데이터 추가</b> 버튼을 누르면 입력칸이 계속 늘어납니다.
      </div>

      <div id="dataRows"></div>

      <div class="grid">
        <div class="col-6">
          <button class="btn btn-secondary" id="addRowBtn">+1 데이터 추가</button>
        </div>
        <div class="col-6">
          <button class="btn btn-light" id="saveDataBtn">데이터 저장</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>추천 옵션</h2>
      <div class="option-list">
        <label class="option-item"><input type="checkbox" class="recOpt" value="hot"> 자주 나온 번호 반영</label>
        <label class="option-item"><input type="checkbox" class="recOpt" value="cold"> 덜 나온 번호 섞기</label>
        <label class="option-item"><input type="checkbox" class="recOpt" value="oddEven"> 홀짝 균형</label>
        <label class="option-item"><input type="checkbox" class="recOpt" value="highLow"> 고저 균형</label>
        <label class="option-item"><input type="checkbox" class="recOpt" value="sumRange"> 합계 안정 범위</label>
        <label class="option-item"><input type="checkbox" class="recOpt" value="avoidRepeat"> 직전 회차 과다 반복 줄이기</label>
        <label class="option-item"><input type="checkbox" class="recOpt" value="dateMix"> 날짜 숫자 반영</label>
        <label class="option-item"><input type="checkbox" class="recOpt" value="sectionMix"> 구간 분산</label>
      </div>

      <div class="grid" style="margin-top:14px;">
        <div class="col-6">
          <button class="btn btn-primary" id="generateBtn">번호 생성</button>
        </div>
        <div class="col-6">
          <button class="btn btn-danger" id="resetBtn">초기화</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>추천 결과</h2>
      <div id="selectedBadges" style="margin-bottom:10px;"></div>
      <div class="result-box" id="resultBox">여기에 추천 번호가 표시됩니다.</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "daebak_lotto_simple_v1";

    const lastRoundEl = document.getElementById("lastRound");
    const lastDrawDateEl = document.getElementById("lastDrawDate");
    const targetDateEl = document.getElementById("targetDate");
    const targetRoundEl = document.getElementById("targetRound");
    const comboCountEl = document.getElementById("comboCount");
    const targetInfoEl = document.getElementById("targetInfo");
    const dataRowsEl = document.getElementById("dataRows");
    const resultBoxEl = document.getElementById("resultBox");
    const selectedBadgesEl = document.getElementById("selectedBadges");

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function parseDate(str) {
      const [y, m, d] = str.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function getNextSaturday(baseDate) {
      const d = new Date(baseDate);
      const day = d.getDay();
      const diff = (6 - day + 7) % 7 || 7;
      d.setDate(d.getDate() + diff);
      return d;
    }

    function calcTarget() {
      const lastRound = Number(lastRoundEl.value || 0);
      const lastDateVal = lastDrawDateEl.value;
      if (!lastRound || !lastDateVal) return;

      const lastDate = parseDate(lastDateVal);
      const nextDate = getNextSaturday(lastDate);
      targetDateEl.value = formatDate(nextDate);
      targetRoundEl.value = lastRound + 1;

      targetInfoEl.textContent =
        `기준 ${lastRound}회 (${lastDateVal}) → 목표 ${lastRound + 1}회 (${formatDate(nextDate)})`;
    }

    function fillComboCount() {
      comboCountEl.innerHTML = "";
      for (let i = 1; i <= 10; i++) {
        const op = document.createElement("option");
        op.value = i;
        op.textContent = `${i}조합`;
        comboCountEl.appendChild(op);
      }
      comboCountEl.value = "3";
    }

    function createNumberInputs(values = ["", "", "", "", "", ""]) {
      return `
        <div class="num-inputs">
          ${values.map(v => `<input type="number" min="1" max="45" class="numVal" value="${v ?? ""}" placeholder="번호" />`).join("")}
        </div>
      `;
    }

    function addDataRow(data = {}) {
      const row = document.createElement("div");
      row.className = "data-row";

      row.innerHTML = `
        <div class="grid">
          <div class="col-3">
            <label>회차</label>
            <input type="number" class="roundVal" min="1" value="${data.round ?? ""}" placeholder="회차" />
          </div>
          <div class="col-3">
            <label>추첨일</label>
            <input type="date" class="dateVal" value="${data.date ?? ""}" />
          </div>
          <div class="col-6">
            <label>당첨번호 6개</label>
            ${createNumberInputs(data.numbers ?? ["", "", "", "", "", ""])}
          </div>
        </div>
        <div class="row-actions">
          <button class="btn btn-light small-btn plusRowBtn" type="button">+1 같은 형식 추가</button>
          <button class="btn btn-danger small-btn removeRowBtn" type="button">삭제</button>
        </div>
      `;

      row.querySelector(".plusRowBtn").addEventListener("click", () => {
        addDataRow({
          round: "",
          date: row.querySelector(".dateVal").value || "",
          numbers: ["", "", "", "", "", ""]
        });
      });

      row.querySelector(".removeRowBtn").addEventListener("click", () => {
        row.remove();
      });

      dataRowsEl.appendChild(row);
    }

    function collectRows() {
      const rows = [...document.querySelectorAll(".data-row")];
      return rows.map(row => {
        const round = Number(row.querySelector(".roundVal").value || 0);
        const date = row.querySelector(".dateVal").value;
        const numbers = [...row.querySelectorAll(".numVal")]
          .map(el => Number(el.value || 0))
          .filter(n => n >= 1 && n <= 45);

        return { round, date, numbers };
      }).filter(r => r.round && r.date && r.numbers.length === 6);
    }

    function saveAll() {
      const state = {
        lastRound: lastRoundEl.value,
        lastDrawDate: lastDrawDateEl.value,
        targetDate: targetDateEl.value,
        targetRound: targetRoundEl.value,
        comboCount: comboCountEl.value,
        options: [...document.querySelectorAll(".recOpt:checked")].map(el => el.value),
        rows: collectRows()
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      alert("저장되었습니다.");
    }

    function loadAll() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return false;

      try {
        const state = JSON.parse(saved);
        lastRoundEl.value = state.lastRound || "1161";
        lastDrawDateEl.value = state.lastDrawDate || "";
        targetDateEl.value = state.targetDate || "";
        targetRoundEl.value = state.targetRound || "";
        comboCountEl.value = state.comboCount || "3";

        document.querySelectorAll(".recOpt").forEach(el => {
          el.checked = (state.options || []).includes(el.value);
        });

        dataRowsEl.innerHTML = "";
        if (state.rows && state.rows.length) {
          state.rows.forEach(r => addDataRow(r));
        } else {
          addDataRow();
        }
        calcTarget();
        return true;
      } catch (e) {
        return false;
      }
    }

    function getSelectedOptions() {
      return [...document.querySelectorAll(".recOpt:checked")].map(el => el.value);
    }

    function showSelectedBadges(opts) {
      const map = {
        hot: "자주 나온 번호",
        cold: "덜 나온 번호",
        oddEven: "홀짝 균형",
        highLow: "고저 균형",
        sumRange: "합계 안정",
        avoidRepeat: "직전 반복 줄이기",
        dateMix: "날짜 숫자 반영",
        sectionMix: "구간 분산"
      };
      selectedBadgesEl.innerHTML = opts.length
        ? opts.map(o => `<span class="pill">${map[o]}</span>`).join("")
        : `<span class="pill">기본 랜덤</span>`;
    }

    function frequencyMap(rows) {
      const freq = {};
      for (let i = 1; i <= 45; i++) freq[i] = 0;
      rows.forEach(r => {
        r.numbers.forEach(n => freq[n]++);
      });
      return freq;
    }

    function getLastRow(rows) {
      if (!rows.length) return null;
      return [...rows].sort((a, b) => b.round - a.round)[0];
    }

    function pickWeighted(freq, pool, preferHigh = true) {
      const items = pool.map(n => ({
        n,
        w: preferHigh ? (freq[n] + 1) : (1 / (freq[n] + 1))
      }));
      const total = items.reduce((s, x) => s + x.w, 0);
      let rnd = Math.random() * total;
      for (const item of items) {
        rnd -= item.w;
        if (rnd <= 0) return item.n;
      }
      return items[items.length - 1].n;
    }

    function sum(arr) {
      return arr.reduce((a, b) => a + b, 0);
    }

    function isValidCombo(nums, opts) {
      const sorted = [...nums].sort((a, b) => a - b);

      if (opts.includes("oddEven")) {
        const odd = sorted.filter(n => n % 2 === 1).length;
        if (odd < 2 || odd > 4) return false;
      }

      if (opts.includes("highLow")) {
        const low = sorted.filter(n => n <= 22).length;
        if (low < 2 || low > 4) return false;
      }

      if (opts.includes("sumRange")) {
        const s = sum(sorted);
        if (s < 100 || s > 175) return false;
      }

      if (opts.includes("sectionMix")) {
        const sec1 = sorted.filter(n => n <= 10).length;
        const sec2 = sorted.filter(n => n >= 11 && n <= 20).length;
        const sec3 = sorted.filter(n => n >= 21 && n <= 30).length;
        const sec4 = sorted.filter(n => n >= 31 && n <= 45).length;
        const sectionsUsed = [sec1, sec2, sec3, sec4].filter(v => v > 0).length;
        if (sectionsUsed < 3) return false;
      }

      for (let i = 0; i < sorted.length - 2; i++) {
        if (sorted[i] + 1 === sorted[i + 1] && sorted[i + 1] + 1 === sorted[i + 2]) {
          return false;
        }
      }

      return true;
    }

    function generateOneCombo(rows, opts, targetDate) {
      const freq = frequencyMap(rows);
      const lastRow = getLastRow(rows);
      const avoidSet = new Set(opts.includes("avoidRepeat") && lastRow ? lastRow.numbers : []);
      const dateNums = new Set();

      if (opts.includes("dateMix") && targetDate) {
        const [y, m, d] = targetDate.split("-").map(Number);
        [y % 100, m, d, (m + d), (y % 10 + d)].forEach(v => {
          if (v >= 1 && v <= 45) dateNums.add(v);
        });
      }

      const combo = new Set();
      let tries = 0;

      while (combo.size < 6 && tries < 500) {
        tries++;

        let pool = Array.from({ length: 45 }, (_, i) => i + 1).filter(n => !combo.has(n));

        if (opts.includes("avoidRepeat")) {
          const filtered = pool.filter(n => !avoidSet.has(n));
          if (filtered.length >= 6 - combo.size) pool = filtered;
        }

        let chosen;
        if (opts.includes("dateMix") && dateNums.size && Math.random() < 0.25) {
          const datePool = [...dateNums].filter(n => pool.includes(n));
          if (datePool.length) {
            chosen = datePool[Math.floor(Math.random() * datePool.length)];
          }
        }

        if (!chosen && opts.includes("hot")) {
          chosen = pickWeighted(freq, pool, true);
        } else if (!chosen && opts.includes("cold")) {
          chosen = pickWeighted(freq, pool, false);
        } else if (!chosen) {
          chosen = pool[Math.floor(Math.random() * pool.length)];
        }

        combo.add(chosen);

        if (tries > 80 && combo.size < 6) {
          combo.clear();
        }
      }

      const arr = [...combo].sort((a, b) => a - b);
      if (arr.length !== 6) return null;
      if (!isValidCombo(arr, opts)) return null;
      return arr;
    }

    function generateCombos() {
      const rows = collectRows();
      const comboCount = Number(comboCountEl.value || 1);
      const opts = getSelectedOptions();
      const targetDate = targetDateEl.value;

      showSelectedBadges(opts);

      const results = [];
      const unique = new Set();
      let safe = 0;

      while (results.length < comboCount && safe < 3000) {
        safe++;
        const combo = generateOneCombo(rows, opts, targetDate);
        if (!combo) continue;
        const key = combo.join(",");
        if (!unique.has(key)) {
          unique.add(key);
          results.push(combo);
        }
      }

      if (!results.length) {
        resultBoxEl.textContent = "생성 가능한 번호가 없습니다.\n데이터를 더 넣거나 옵션을 조금 줄여보세요.";
        return;
      }

      resultBoxEl.textContent = results
        .map((r, i) => `${i + 1}조합  :  ${r.join(" , ")}`)
        .join("\n");
    }

    function resetAll() {
      if (!confirm("입력값과 결과를 초기화할까요?")) return;

      localStorage.removeItem(STORAGE_KEY);
      dataRowsEl.innerHTML = "";

      const today = new Date();
      const lastSaturday = new Date(today);
      lastSaturday.setDate(today.getDate() - ((today.getDay() + 1) % 7 || 7));

      lastRoundEl.value = 1161;
      lastDrawDateEl.value = formatDate(lastSaturday);
      calcTarget();
      comboCountEl.value = "3";

      document.querySelectorAll(".recOpt").forEach(el => el.checked = false);
      addDataRow({
        round: 1161,
        date: formatDate(lastSaturday),
        numbers: ["", "", "", "", "", ""]
      });

      selectedBadgesEl.innerHTML = "";
      resultBoxEl.textContent = "여기에 추천 번호가 표시됩니다.";
    }

    // 이벤트
    document.getElementById("addRowBtn").addEventListener("click", () => addDataRow());
    document.getElementById("saveDataBtn").addEventListener("click", saveAll);
    document.getElementById("generateBtn").addEventListener("click", generateCombos);
    document.getElementById("resetBtn").addEventListener("click", resetAll);

    lastRoundEl.addEventListener("input", calcTarget);
    lastDrawDateEl.addEventListener("change", calcTarget);

    // 초기 실행
    fillComboCount();

    const loaded = loadAll();
    if (!loaded) {
      const today = new Date();
      const base = new Date(today);
      base.setDate(today.getDate() - ((today.getDay() + 1) % 7 || 7));
      lastDrawDateEl.value = formatDate(base);
      calcTarget();
      addDataRow({
        round: Number(lastRoundEl.value),
        date: lastDrawDateEl.value,
        numbers: ["", "", "", "", "", ""]
      });
    }
  </script>
</body>
</html>
